<style>
:root {
/* V2.3 NEON OBSIDIAN THEME */
--bg-dark: #090a0f; 
--bg-card: rgba(12, 14, 20, 0.6); 
--accent-main: #00e5ff; 
--accent-secondary: #b300ff;
--text-main: #ffffff; 
--text-muted: #8b949e; 
--border-color: rgba(0, 229, 255, 0.2); 
--card-shadow: 0 12px 30px rgba(0, 0, 0, 0.8);
--header-bg: rgba(9, 10, 15, 0.85);
--transition-speed: 0.4s; 
--glow-accent: 0 0 20px rgba(0, 229, 255, 0.35); 
--font-sans: 'Montserrat', sans-serif;
--dot-green: #00ff88; 
--dot-red: #ff3366;
}

body.light-mode {
--bg-dark: #f0f2f5; 
--bg-card: rgba(255, 255, 255, 0.8); 
--accent-main: #00b8cc;
--accent-secondary: #8a00c2;
--text-main: #1a1c23; 
--text-muted: #6b7280; 
--border-color: rgba(0, 184, 204, 0.3);
--card-shadow: 0 12px 30px rgba(0, 0, 0, 0.05); 
--header-bg: rgba(240, 242, 245, 0.85);
--glow-accent: 0 0 20px rgba(0, 184, 204, 0.15); 
}

html, body {
height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background-color: var(--bg-dark); transition: background-color var(--transition-speed) ease;
font-family: var(--font-sans); font-weight: 300; color: var(--text-main); -webkit-font-smoothing: antialiased;
-webkit-tap-highlight-color: transparent;
}

h1, h2, h3, h4, .section-title, .player-info { margin: 0; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg-dark); } ::-webkit-scrollbar-thumb { background: var(--accent-secondary); border-radius: 3px; }

#app-background { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -100; background-image: url('https://i.imgur.com/lK3ctDR.jpeg'); background-size: cover; background-position: center;
filter: grayscale(75%) sepia(25%) hue-rotate(190deg) brightness(0.2) contrast(1.3); transition: background-image 0.4s ease-in-out; }

/* V2.3 Topographic Grid & HUD Scanlines */
#app-background::after { 
    content: ''; position: absolute; inset: 0; 
    background-image: 
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.4) 2px, rgba(0,0,0,0.4) 4px),
        linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
    background-size: 100% 100%, 30px 30px, 30px 30px;
    pointer-events: none; z-index: 1;
}

.main-scroll-area { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-y: none; padding-bottom: calc(120px + env(safe-area-inset-bottom, 0px)); box-sizing: border-box; }

/* V2.3 Orbital Loader */
.loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(9, 10, 15, 0.9); backdrop-filter: blur(16px);
z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
.loader-overlay.active { opacity: 1; pointer-events: all; }
.loader-ring { width: 80px; height: 80px; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--accent-main); border-bottom-color: var(--accent-secondary); animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; position: relative; margin-bottom: 32px; }
.loader-ring::before { content: ''; position: absolute; inset: 8px; border-radius: 50%; border: 3px solid transparent; border-left-color: var(--accent-main); border-right-color: var(--accent-secondary); animation: spin-reverse 2s linear infinite; }
.loader-ring::after { content: ''; position: absolute; inset: 20px; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--text-main); animation: spin 1s ease-in-out infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }
@keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
.loader-text { font-family: var(--font-sans); font-size: 12px; font-weight: 500; letter-spacing: 6px; text-transform: uppercase; color: var(--accent-main); animation: textPulse 1.5s infinite; }
@keyframes textPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.container { padding: calc(32px + env(safe-area-inset-top, 0px)) max(20px, env(safe-area-inset-right, 0px)) 32px max(20px, env(safe-area-inset-left, 0px)); max-width: 600px; margin: auto; }
input, select { width: 100%; padding: 16px; margin-bottom: 0; border: 1px solid var(--border-color); border-radius: 12px; background-color: var(--bg-card); color: var(--text-main);
box-sizing: border-box; font-size: 14px; outline: none; transition: all 0.4s ease; backdrop-filter: blur(16px); }
.control-row { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
.control-row input { flex: 1; margin-bottom: 0; }
.control-row select { flex-shrink: 0; width: auto; font-size: 11px; letter-spacing: 1px; margin-bottom: 0;}
.compare-btn { flex-shrink:0; padding:16px 20px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:12px; color:var(--accent-main); font-family:var(--font-sans); font-size:11px; text-transform:uppercase; letter-spacing:1px; cursor:pointer; backdrop-filter: blur(16px); transition: all 0.3s ease; }
.compare-btn:active { transform: scale(0.95); }

/* V2.3 Geometric Plasma Cards ("Lava Lamp" effect) */
.player-card { 
    position: relative; background: var(--bg-card); border: 1px solid var(--border-color); 
    border-radius: 16px; margin-bottom: 12px; box-shadow: var(--card-shadow); 
    overflow: hidden; transition: transform var(--transition-speed) ease, border-color 0.3s ease; 
    cursor: pointer; backdrop-filter: blur(12px);
}
.player-card::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 30%, rgba(0, 229, 255, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(179, 0, 255, 0.12) 0%, transparent 40%);
    animation: geometricPlasma 15s ease-in-out infinite alternate;
    z-index: 0; pointer-events: none;
}
.player-card:hover { border-color: rgba(0, 229, 255, 0.5); }
.player-card:active { transform: scale(0.98); }
.player-card > * { position: relative; z-index: 1; }

@keyframes geometricPlasma {
    0% { transform: translate(0, 0) rotate(0deg) scale(1); }
    33% { transform: translate(5%, 10%) rotate(15deg) scale(1.1); }
    66% { transform: translate(-5%, 5%) rotate(-5deg) scale(0.95); }
    100% { transform: translate(-10%, -10%) rotate(10deg) scale(1.05); }
}

.card-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
.player-info { display: flex; align-items: center; gap: 12px; }

/* V2.3 Mini HUD Rings */
.mini-ring { width: 44px; height: 44px; border-radius: 50%; background: conic-gradient(var(--accent-main) var(--pct), rgba(255,255,255,0.05) 0deg); display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 10px rgba(0, 229, 255, 0.15); flex-shrink: 0; }
.mini-ring::before { content: ""; position: absolute; inset: 3px; background: #101219; border-radius: 50%; }
.mini-ring span { position: relative; font-size: 11px; font-weight: 600; color: var(--text-main); font-family: var(--font-sans); }

/* Bottom Sheet Modal */
.sheet-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1500; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; backdrop-filter: blur(4px); }
.sheet-backdrop.active { opacity: 1; pointer-events: all; }
.bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--header-bg); backdrop-filter: blur(24px); border-top-left-radius: 24px; border-top-right-radius: 24px; z-index: 2000; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); max-height: 85vh; overflow-y: auto; padding: 40px 20px 20px 20px; box-sizing: border-box; border-top: 1px solid var(--border-color); box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
.bottom-sheet.open { transform: translateY(0); }
.close-btn { position: absolute; top: 16px; right: 20px; width: 32px; height: 32px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent-main); font-size: 14px; cursor: pointer; backdrop-filter: blur(8px); transition: background 0.3s; z-index: 10; font-weight: 600;}
.close-btn:active { background: rgba(0, 229, 255, 0.2); }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 16px; margin-bottom: 24px;}
.stat-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; text-align: center; position: relative; overflow: hidden;}
.stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; position: relative; z-index: 2;}
.stat-val { font-size: 13px; color: var(--accent-main); font-family: var(--font-sans); font-weight:600; position: relative; z-index: 2;}

.chart-container { margin-top: 24px; position: relative; width: 100%; }
.compare-row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border-color); align-items: center; }
.compare-label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); flex: 1; text-align: center; letter-spacing: 1px;}
.compare-val { font-size: 16px; width: 30%; text-align: center; transition: color 0.4s ease; font-family: var(--font-sans); letter-spacing: 1px;}
.radar-container { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: var(--card-shadow); backdrop-filter: blur(16px); padding: 24px 0; margin-top: 24px; height: 340px; position: relative; width: 100%; box-sizing: border-box; }

/* V2.3 Glowing Bottom Nav */
.bottom-nav-wrapper { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; z-index: 1000; background: var(--header-bg); backdrop-filter: blur(24px); border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom, 0px); }
.bottom-nav { display: flex; width: 100%; max-width: 600px; padding: 12px 8px; justify-content: space-around; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 9px; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; background: transparent; padding: 8px 16px; border-radius: 12px;}
.nav-btn span { font-size: 20px; transition: transform 0.3s ease; }
.nav-btn.active { color: var(--accent-main); }
.nav-btn.active span { transform: translateY(-4px); filter: drop-shadow(0 0 8px var(--accent-main)); }
.nav-btn.active::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent-main); box-shadow: 0 0 10px var(--accent-main); }

/* Micro-Glitch Tab Transition */
.tab-content { display: none; min-height: calc(100% + 1px); }
.tab-content.active { display: block; animation: tabEnterGlitch 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
@keyframes tabEnterGlitch {
    0% { opacity: 0; transform: translateY(10px) scale(0.98); text-shadow: 3px 0 var(--accent-main), -3px 0 var(--accent-secondary); filter: blur(4px); }
    30% { opacity: 0.5; transform: translateY(-2px) scale(1.01); text-shadow: -3px 0 var(--accent-main), 3px 0 var(--accent-secondary); filter: blur(2px); }
    60% { opacity: 0.8; transform: translateY(1px) scale(0.99); text-shadow: 1px 0 var(--accent-main), -1px 0 var(--accent-secondary); filter: blur(1px); }
    100% { opacity: 1; transform: translateY(0) scale(1); text-shadow: none; filter: blur(0); }
}

.section-title { text-align: center; color: var(--text-muted); margin-top: 32px; margin-bottom: 24px; text-transform:uppercase; font-size: 16px; letter-spacing: 4px; }

.status-badge { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 100px; font-size: 9px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
.badge-hit-rate { background: rgba(0, 255, 136, 0.15); border: 1px solid rgba(0, 255, 136, 0.35); color: var(--dot-green); }

/* V2 CWL Carousel & War Room */
.cwl-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 16px; padding-bottom: 16px; scrollbar-width: none; -ms-overflow-style: none; margin-top: 16px;}
.cwl-carousel::-webkit-scrollbar { display: none; }
.carousel-slide { min-width: 100%; scroll-snap-align: center; box-sizing: border-box; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; box-shadow: var(--card-shadow); backdrop-filter: blur(16px); }
.war-room-header { background: linear-gradient(135deg, rgba(9,10,15,0.9), rgba(18,20,28,0.95)); border: 1px solid var(--accent-secondary); border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(179, 0, 255, 0.15); }
.strike-pill { flex-shrink:0; background:rgba(0,0,0,0.6); border:1px solid var(--border-color); padding:8px 16px; border-radius:100px; font-size:11px; color:var(--text-main); font-family:var(--font-sans); }

/* V2.3 Holographic Target Locks (Replaces Sonar Pings) */
.holo-wrapper { position: relative; display: inline-flex; align-items: center; justify-content: center; padding: 12px; margin-bottom: 4px;}
.holo-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px dashed rgba(0, 229, 255, 0.6); animation: holoSpin 15s linear infinite; pointer-events: none; }
.holo-ring::before { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 1px solid rgba(0, 229, 255, 0.2); animation: holoPulse 4s ease-in-out infinite alternate; }
.holo-ring::after { content: ''; position: absolute; inset: 4px; border-radius: 50%; border: 1px solid rgba(0, 229, 255, 0.1); animation: holoSpinReverse 10s linear infinite; }

.holo-wrapper.enemy .holo-ring { border-color: rgba(255, 51, 102, 0.6); }
.holo-wrapper.enemy .holo-ring::before { border-color: rgba(255, 51, 102, 0.2); }
.holo-wrapper.enemy .holo-ring::after { border-color: rgba(255, 51, 102, 0.1); }

@keyframes holoSpin { 100% { transform: rotate(360deg); } }
@keyframes holoSpinReverse { 100% { transform: rotate(-360deg); } }
@keyframes holoPulse { 0% { transform: scale(0.95); opacity: 0.5; } 100% { transform: scale(1.05); opacity: 1; } }

.circular-progress { width: 100px; height: 100px; border-radius: 50%; background: conic-gradient(var(--accent-main) var(--progress), rgba(255,255,255,0.05) 0deg); display: flex; align-items: center; justify-content: center; position: relative; box-shadow: var(--glow-accent); flex-shrink: 0; }
.circular-progress::before { content: ""; position: absolute; inset: 6px; background: #12141c; border-radius: 50%; backdrop-filter: blur(16px); }
.circular-value { position: relative; font-size: 20px; font-weight: 500; color: var(--text-main); font-family: var(--font-sans); }
.time-to-max-banner { background: rgba(0, 229, 255, 0.08); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; text-align: center; margin-bottom: 24px; margin-top: 8px;}

/* V2.3 Segmented Energy Bar */
.energy-bar-container { display: flex; gap: 2px; height: 8px; width: 85%; margin: 0 auto; }
.energy-segment { flex: 1; background: rgba(255,255,255,0.05); border-radius: 1px; transition: background 0.3s ease; }
.energy-segment.filled { background: var(--accent-main); box-shadow: 0 0 5px var(--accent-main); }
</style>
</head>
<body>

<div id="app-background"></div>

<div class="loader-overlay" id="loaderOverlay">
<div class="loader-ring"></div>
<div class="loader-text" id="loaderText">Establishing Link...</div>
</div>

<div class="main-scroll-area" id="mainScroll">
<div class="container">

<div id="roster-tab" class="tab-content">
  
<div class="player-card" style="text-align: center; cursor: default; margin-bottom: 24px;">
    <div style="padding: 24px;">
        <h4 style="color: var(--text-muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;">Active Roster Progression</h4>
        <div style="display: flex; justify-content: center; align-items: center; gap: 24px;">
            <div class="circular-progress" id="global-circle" style="--progress: 0%;">
                <div class="circular-value" id="global-pct-val">0%</div>
            </div>
            <div style="text-align: left;">
                <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">30-Day Growth</div>
                <div id="global-change-val" style="font-size: 18px; font-weight: 500; color: var(--dot-green);">+0.00%</div>
                <div style="font-size: 9px; color: var(--text-muted); margin-top: 6px;" id="global-progress-count">0 Operators Advancing</div>
            </div>
        </div>
    </div>
</div>

<div class="control-row" id="roster-controls" style="display:none;">
<input type="text" id="searchInput" placeholder="Search Clan Roster..." oninput="debouncedFilterRoster()">
<select id="sortSelect" onchange="filterRoster()">
<option value="comp">Overall %</option>
<option value="hero">Hero %</option>
<option value="pet">Pet %</option>
</select>
<button class="compare-btn" onclick="toggleCompareMode()">Compare</button>
</div>

<div id="roster-compare-section" style="display:none;">
  <div style="display:flex; gap: 16px; margin-bottom: 24px;">
  <div style="flex:1;"><label style="font-size: 10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:8px;">Operator 1</label><select id="player1Select" onchange="comparePlayers()"><option>Loading...</option></select></div>
  <div style="flex:1;"><label style="font-size: 10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:8px;">Operator 2</label><select id="player2Select" onchange="comparePlayers()"><option>Loading...</option></select></div>
  </div>
  <div id="radarSection" style="display:none;">
  <h4 class="section-title" style="margin-top:0;">Head-to-Head Stats</h4>
  <div class="player-card" style="margin-bottom: 24px; cursor: default;">
      <div style="padding: 0 20px;" id="compareDetailsGrid"></div>
  </div>
  <h4 class="section-title">Hero Distribution (%)</h4>
  <div class="radar-container"><canvas id="heroRadar"></canvas></div>
  <h4 class="section-title">Pet Distribution (%)</h4>
  <div class="radar-container"><canvas id="petRadar"></canvas></div>
  </div>
</div>

<div id="roster-container"><p style="text-align:center; color: var(--text-muted); font-size: 12px; letter-spacing: 2px;">Preparing roster...</p></div>
</div>

<div id="war-tab" class="tab-content active">
<div id="war-container"><p style="text-align:center; color: var(--text-muted); font-size: 12px; letter-spacing: 2px; margin-top:40px;">Fetching CWL Database...</p></div>
</div>

</div>
</div>

<div class="bottom-nav-wrapper">
<div class="bottom-nav">
<div class="nav-btn" onclick="switchTab('roster')"><span>🛡</span> Roster</div>
<div class="nav-btn active" onclick="switchTab('war')"><span>⚔</span> War Room</div>
</div>
</div>

<div id="sheetBackdrop" class="sheet-backdrop" onclick="closeBottomSheet()"></div>
<div id="playerBottomSheet" class="bottom-sheet">
  <div class="close-btn" onclick="closeBottomSheet()">✕</div>
  <div id="bottomSheetContent"></div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw7ZpPJfVNu8afK61gVbKpFgk1XEh5kJmaZWryJ1oA83uu9Ujy4LnJou1yyg3i_hLFB/exec";

function debounce(fn, delay) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
}
const debouncedFilterRoster = debounce(() => filterRoster(), 250);

let globalPlayerData = [];
let displayedPlayerData = [];
let clanData = {};
let warInfo = null;
let chartsRegistry = { radarHero: null, radarPet: null, cwlLineChart: null };
let sheetCharts = { history: null, hero: null, pet: null }; 
let currentRosterFilter = 'all';

const CWL_TAGS = ["#PG0R8GQPQ", "#YCRV8GP0U", "#RYPU89Y8", "#99JQPVU9Q", "#GRJRUYP0", "#8QGVV099U", "#2RL2JGJPJ", "#Y8LY2VUJ9", "#GYJ00RJ2Q", "#G9YR000R8", "#20YLLYC9P", "#QVCLVUQVY", "#9LGG22Q28", "#GGULC2CR", "#9R0C82GU"];

const maxLevelsMap = {
"Barbarian King": 105, "Archer Queen": 105, "Grand Warden": 80, "Royal Champion": 55, "Minion Prince": 95, "Dragon Duke": 25,
"Electro Owl": 15, "Unicorn": 15, "Frosty": 15, "Diggy": 10, "Phoenix": 10, "Spirit Fox": 10, "Angry Jelly": 10, "Sneezy": 10, "Greedy Raven": 10
};
const heroNames = ["Barbarian King", "Archer Queen", "Grand Warden", "Royal Champion", "Minion Prince", "Dragon Duke"];
const petNames = ["Electro Owl", "Unicorn", "Frosty", "Diggy", "Phoenix", "Spirit Fox", "Angry Jelly", "Sneezy", "Greedy Raven"];

function formatMonth(m) {
    if(!m) return "N/A";
    let d = new Date(m);
    if (!isNaN(d.getTime())) return d.toLocaleString('default', { month: 'short', year: 'numeric' });
    let parts = m.toString().split('-');
    if(parts.length >= 2) {
        let date = new Date(parts[0], parseInt(parts[1]) - 1);
        return date.toLocaleString('default', { month: 'short', year: 'numeric' });
    }
    return m;
}

function countUp(elId, endVal, isPct, prefix="") {
const el = document.getElementById(elId); if(!el) return;
let duration = 2500, start = 0, startTime = null, end = parseFloat(endVal) || 0;
const step = (t) => {
if(!startTime) startTime = t; let p = Math.min((t - startTime)/duration, 1), ease = 1 - Math.pow(1 - p, 3);
let curr = start + ease * (end - start);
el.innerText = prefix + (isPct ? curr.toFixed(1) + '%' : Math.floor(curr));
if(p < 1) requestAnimationFrame(step); else el.innerText = prefix + (isPct ? end.toFixed(1) + '%' : end);
}; requestAnimationFrame(step);
}

async function fetchDashboardData(callback) {
showLoader("Crunching Roster Data...");
try {
  let res = await fetch(WEB_APP_URL + "?action=getDashboardData");
  let data = await res.json();
  if (data.error) throw new Error(data.error);

  if(data && data.players) {
    globalPlayerData = data.players;
    clanData = data;
    warInfo = data.warInfo || { type: "NONE", data: null };

    let progressingPlayers = 0;
    let currentTotal = 0;
    let oldTotal = 0;

    globalPlayerData.forEach(p => {
        let pcts = p.historyPcts || [];
        if (pcts.length > 0) {
            let curr = parseFloat(pcts[pcts.length - 1]);
            let old = parseFloat(pcts[0]);
            if (curr > old) {
                progressingPlayers++;
                currentTotal += curr;
                oldTotal += old;
            }
        }
    });

    let currentGlobal = progressingPlayers > 0 ? (currentTotal / progressingPlayers) : 0;
    let oldGlobal = progressingPlayers > 0 ? (oldTotal / progressingPlayers) : 0;
    let change = currentGlobal - oldGlobal;

    document.getElementById('global-circle').style.setProperty('--progress', `${currentGlobal}%`);
    countUp('global-pct-val', currentGlobal, true);
    
    let changeEl = document.getElementById('global-change-val');
    changeEl.innerText = (change >= 0 ? "+" : "") + change.toFixed(2) + "%";
    changeEl.style.color = change >= 0 ? "var(--dot-green)" : "var(--dot-red)";
    document.getElementById('global-progress-count').innerText = `${progressingPlayers} Operators Advancing`;

    document.getElementById('roster-controls').style.display = globalPlayerData.length > 0 ? "flex" : "none";

    filterRoster(); renderWar();
  }
  hideLoader();
  if(callback) callback();
} catch (err) {
  hideLoader(); 
  alert("Backend Crash: " + err.message);
}
}

// Data Scramble Animation Utility
function scrambleText(elementId, finalValue) {
    const el = document.getElementById(elementId);
    if (!el) return;
    const chars = "0123456789!@#$%^&*()_+{}|[]<>?";
    let iterations = 0;
    const interval = setInterval(() => {
        let text = "";
        for(let i = 0; i < finalValue.toString().length; i++) {
            text += chars[Math.floor(Math.random() * chars.length)];
        }
        el.innerText = text;
        iterations++;
        if (iterations >= 8) {
            clearInterval(interval);
            el.innerText = finalValue;
        }
    }, 40);
}

function buildTargetAssignments(round) {
    if (!round.myLineup || !round.enemyLineup) return '';

    let html = `<div style="margin-top:32px;">
        <p style="font-size: 11px; color: var(--accent-main); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; text-align:center; border-top: 1px solid var(--border-color); padding-top: 24px;">Tactical AI Assignments</p>
        <p style="font-size: 9px; color: var(--text-muted); text-align:center; margin-bottom: 16px;">Strategic assignment routing based on offensive strike rates.</p>
        <div style="font-size: 11px; display:flex; flex-direction:column; gap:6px;">`;

    let enemyPool = [...round.enemyLineup].map(e => ({...e, assigned: false}));
    let assignments = [];

    round.myLineup.forEach(us => {
        let pData = globalPlayerData.find(p => p.tag === us.tag);
        let hr = (pData && pData.hitRate !== undefined && pData.hitRate !== null) ? pData.hitRate : 50;
        let attacks = pData ? (pData.cwlStats ? pData.cwlStats.attacks : 0) : 0;
        
        let attackerClass = "Standard";
        if (attacks > 0 && hr >= 66) attackerClass = "Elite";
        else if (attacks > 0 && hr < 33) attackerClass = "Struggling";

        assignments.push({ us, attackerClass, hr, target: null });
    });

    assignments.sort((a,b) => {
        if (a.attackerClass === "Struggling" && b.attackerClass !== "Struggling") return -1;
        if (a.attackerClass !== "Struggling" && b.attackerClass === "Struggling") return 1;
        return b.us.th - a.us.th; 
    });

    assignments.forEach(a => {
        let candidates = enemyPool.filter(e => !e.assigned);
        if (candidates.length === 0) return;

        let best = null;
        if (a.attackerClass === "Struggling") {
            let weakBases = candidates.filter(e => e.th <= a.us.th);
            if (weakBases.length > 0) best = weakBases.sort((x,y) => y.th - x.th)[0]; 
        } else if (a.attackerClass === "Elite") {
            let strongBases = candidates.filter(e => e.th >= a.us.th);
            if (strongBases.length > 0) best = strongBases.sort((x,y) => x.th - y.th)[0]; 
        }

        if (!best) {
            candidates.sort((x,y) => Math.abs(x.th - a.us.th) - Math.abs(y.th - a.us.th));
            best = candidates[0];
        }

        best.assigned = true;
        a.target = best;
    });

    assignments.sort((a,b) => a.us.mapPosition - b.us.mapPosition);

    assignments.forEach(a => {
        if (!a.target) return;
        let usColor = a.attackerClass === "Elite" ? "var(--dot-green)" : (a.attackerClass === "Struggling" ? "var(--dot-red)" : "var(--text-main)");
        let tgtColor = "var(--text-main)";
        
        html += `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:rgba(0,0,0,0.4); border:1px solid var(--border-color); border-radius:8px;">
            <div style="color:${usColor}; flex:1; font-weight:500;">${a.us.mapPosition}. ${a.us.name} <span style="font-size:8px; opacity:0.7;">(TH${a.us.th})</span></div>
            <div style="color:var(--text-muted); font-size:14px; padding:0 8px;">🎯</div>
            <div style="color:${tgtColor}; flex:1; text-align:right; font-weight:500;">${a.target.mapPosition}. ${a.target.name} <span style="font-size:8px; opacity:0.7;">(TH${a.target.th})</span></div>
        </div>`;
    });

    html += `</div></div>`;
    return html;
}

if (activeRound.state === "inWar" && hitList.length > 0) {
    html += `<h4 style="margin-top:0; font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Pending Strikes (${hitList.length})</h4>
    <div style="display:flex; gap:8px; overflow-x:auto; padding-bottom:16px; margin-bottom:16px; scrollbar-width:none;">`;
    hitList.forEach(p => { html += `<div class="strike-pill">${p.name}</div>`; });
    html += `</div>`;
}

html += `<h4 class="section-title" style="margin-top:16px;">CWL Matrix</h4>`;

html += `<div class="cwl-carousel" id="cwlCarousel">`;

warInfo.cwlDetails.forEach((round, index) => {
let isCurrent = (index === activeIdx);
let myTHs = {}; let oppTHs = {};
(round.myLineup || []).forEach(p => myTHs[p.th] = (myTHs[p.th] || 0) + 1);
(round.enemyLineup || []).forEach(p => oppTHs[p.th] = (oppTHs[p.th] || 0) + 1);
let allTHs = [...new Set([...Object.keys(myTHs), ...Object.keys(oppTHs)])].sort((a,b)=>b-a);

let thHtml = `<div style="margin-top:16px;">
<p style="font-size: 10px; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; text-align:center;">Town Hall Matchup Radar</p>
<div style="display:flex; flex-direction:column; gap:6px;">`;
allTHs.forEach(th => {
if (th == 0) return;
let us = myTHs[th] || 0; let them = oppTHs[th] || 0;
let rSize = Math.max(round.myLineup.length, 15);
let usBar = Math.min((us/rSize)*100, 100); 
let themBar = Math.min((them/rSize)*100, 100);

thHtml += `<div style="display:flex; align-items:center; font-size:11px;">
<div style="flex:1; display:flex; justify-content:flex-end; align-items:center; gap:8px;">
<span style="color:var(--accent-main); font-weight:500;">${us}</span>
<div style="width:50px; height:6px; background:rgba(0,0,0,0.5); border-radius:3px; overflow:hidden; display:flex; justify-content:flex-end;"><div style="width:${usBar}%; height:100%; background:var(--accent-main);"></div></div>
</div>
<div style="width:40px; text-align:center; color:var(--text-muted); font-weight:500;">TH${th}</div>
<div style="flex:1; display:flex; justify-content:flex-start; align-items:center; gap:8px;">
<div style="width:50px; height:6px; background:rgba(0,0,0,0.5); border-radius:3px; overflow:hidden;"><div style="width:${themBar}%; height:100%; background:var(--dot-red);"></div></div>
<span style="color:var(--dot-red); font-weight:500;">${them}</span>
</div></div>`;
});
thHtml += `</div></div>`;

let pat = round.attackPattern || { mirrors: 0, dips: 0, reaches: 0, total: 0, threeStars: 0 };
let atkHitRate = pat.total > 0 ? Math.round((pat.threeStars/pat.total)*100) : 0;

let patHtml = `<div style="margin-top:24px; padding:16px; background:rgba(0,0,0,0.3); border:1px solid var(--border-color); border-radius:12px; text-align:center;">
<p style="font-size: 10px; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">Enemy Attack Profile</p>
<div style="display:flex; justify-content:space-around; font-size:11px;">
<div><span style="color:var(--text-muted); display:block; font-size:9px; margin-bottom:4px;">Mirrors</span><span style="color:var(--accent-main); font-size:16px; font-weight:500;">${pat.mirrors}</span></div>
<div><span style="color:var(--text-muted); display:block; font-size:9px; margin-bottom:4px;">Dips</span><span style="color:var(--dot-red); font-size:16px; font-weight:500;">${pat.dips}</span></div>
<div><span style="color:var(--text-muted); display:block; font-size:9px; margin-bottom:4px;">Reaches</span><span style="color:var(--dot-green); font-size:16px; font-weight:500;">${pat.reaches}</span></div>
<div><span style="color:var(--text-muted); display:block; font-size:9px; margin-bottom:4px;">Hit Rate</span><span style="color:var(--text-main); font-size:16px; font-weight:500;">${atkHitRate}%</span></div>
</div>
</div>`;

let rosterHtml = `<div style="margin-top:32px;">
<p style="font-size: 10px; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; text-align:center;">Enemy Roster</p>`;
(round.enemyLineup || []).forEach(e => {
let atkStatus = e.attacks > 0 ? `<span style="color:var(--dot-red);">⚔️</span>` : `<span style="color:var(--text-muted);">💤</span>`;
let ironCladHtml = (e.defenses && e.defenses > 1) ? `<span style="background:rgba(179,0,255,0.15); color:var(--accent-secondary); border:1px solid rgba(179,0,255,0.3); padding:2px 6px; border-radius:4px; font-size:8px; margin-left:4px;">🛡️ Iron Clad (${e.defenses})</span>` : '';

rosterHtml += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(0, 229, 255, 0.1); font-size:12px; align-items:center;">
<div>
<span style="color:var(--text-muted); width:24px; display:inline-block; font-size:10px;">#${e.mapPosition}</span>
<span style="font-weight:500;">${e.name}</span> <span style="color:var(--accent-main); font-size:9px; margin-left:4px; font-weight:500;">TH${e.th}</span>
${ironCladHtml}
</div>
<div>${atkStatus}</div>
</div>`;
});
rosterHtml += `</div>`;

if (isCurrent) {
    rosterHtml += buildTargetAssignments(round);
}

html += `
<div class="carousel-slide ${isCurrent ? 'active' : ''}">
  <div style="display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid var(--border-color); padding-bottom:12px; margin-bottom:16px;">
    <div style="font-size:15px; font-weight:600; font-family:var(--font-sans);">Round ${index + 1}: ${round.opponent.name}</div>
    <div style="font-size:9px; color:var(--accent-main); text-transform:uppercase; letter-spacing:1px; font-weight:600;">${round.state}</div>
  </div>
  ${patHtml}
  ${thHtml}
  ${rosterHtml}
</div>`;
});

html += `</div>`; 

if (clanData.cwlHistoricalStats && clanData.cwlHistoricalStats.length > 0) {
  html += `<h4 class="section-title" style="margin-top:48px;">Historical CWL Performance</h4>`;
  html += `<div class="player-card" style="padding: 20px; cursor: default;"><div class="chart-container" style="height: 180px; margin-top:0;"><canvas id="cwlHistoryChart"></canvas></div></div>`;
  
  clanData.cwlHistoricalStats.forEach(season => {
    let posColor = season.position === 1 ? "var(--accent-main)" : (season.position <= 2 ? "var(--dot-green)" : (season.position >= 7 ? "var(--dot-red)" : "var(--text-main)"));
    html += `
    <div class="player-card" style="margin-bottom:12px;">
      <div class="player-card-inner" style="flex-direction:column; align-items:stretch;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-size:13px; font-weight:500;">${formatMonth(season.season)} <span style="font-size:9px; color:var(--text-muted); font-weight:normal; margin-left:8px; text-transform:uppercase;">${season.league}</span></div>
            <div style="font-size:9px; text-transform:uppercase; letter-spacing:1px; color:${posColor}; font-weight:600;">Pos: ${season.position}</div>
        </div>
        <div class="stat-grid" style="margin-top:16px; margin-bottom:8px;">
          <div class="stat-box"><div class="stat-label">Stars</div><div class="stat-val">${season.stars}</div></div>
          <div class="stat-box"><div class="stat-label">3★ Hits</div><div class="stat-val">${season.threeStars}</div></div>
          <div class="stat-box"><div class="stat-label">Record</div><div class="stat-val">${season.wins}W - ${season.losses}L</div></div>
        </div>
        <div style="text-align:center; font-size:10px; color:var(--text-muted); margin-top:8px;">Total Destruction: ${season.destruction.toLocaleString()}</div>
      </div>
    </div>`;
  });
}

container.innerHTML = html;

if (clanData.cwlHistoricalStats && clanData.cwlHistoricalStats.length > 0) {
  let chartData = [...clanData.cwlHistoricalStats].reverse();
  let dates = chartData.map(s => formatMonth(s.season));
  let stars = chartData.map(s => s.stars);
  let ctx = document.getElementById('cwlHistoryChart');
  if (ctx) {
      if (chartsRegistry.cwlLineChart) chartsRegistry.cwlLineChart.destroy();
      chartsRegistry.cwlLineChart = renderLineChart(ctx.getContext('2d'), dates, stars, 'CWL Stars');
  }
}
}

function toggleCompareMode() {
    let compSec = document.getElementById('roster-compare-section');
    let rosterCont = document.getElementById('roster-container');
    if (compSec.style.display === 'none') {
        compSec.style.display = 'block';
        rosterCont.style.display = 'none';
        populateVersusDropdowns();
    } else {
        compSec.style.display = 'none';
        rosterCont.style.display = 'block';
    }
}

function populateVersusDropdowns() {
var sel1 = document.getElementById('player1Select'), sel2 = document.getElementById('player2Select');
sel1.innerHTML = ""; sel2.innerHTML = "";
let validPlayers = globalPlayerData.filter(p => CWL_TAGS.includes(p.tag));
if (validPlayers.length === 0) validPlayers = globalPlayerData;
validPlayers.forEach((p, i) => { sel1.add(new Option(p.name, i)); sel2.add(new Option(p.name, i)); });
if(validPlayers.length > 1) sel2.selectedIndex = 1; comparePlayers();
}

const getRadarGradient = (context, colorStart, colorEnd) => {
const chartArea = context.chart.chartArea; if (!chartArea) return colorStart; const ctx = context.chart.ctx; const centerX = (chartArea.left + chartArea.right) / 2;
const centerY = (chartArea.top + chartArea.bottom) / 2; const r = Math.min(chartArea.right - chartArea.left, chartArea.bottom - chartArea.top) / 2;
const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, r); gradient.addColorStop(0, colorStart); gradient.addColorStop(1, colorEnd); return gradient;
};

function comparePlayers() {
let validPlayers = globalPlayerData.filter(p => CWL_TAGS.includes(p.tag));
if (validPlayers.length === 0) validPlayers = globalPlayerData;
let p1 = validPlayers[document.getElementById('player1Select').value], p2 = validPlayers[document.getElementById('player2Select').value];
if(!p1 || !p2) return;
document.getElementById('radarSection').style.display = "block";
if (chartsRegistry.radarHero) chartsRegistry.radarHero.destroy(); if (chartsRegistry.radarPet) chartsRegistry.radarPet.destroy();

let p1H = parseInt((p1.heroStats||"0").split('/')[0]), p2H = parseInt((p2.heroStats||"0").split('/')[0]);
let p1P = parseInt((p1.petStats||"0").split('/')[0]), p2P = parseInt((p2.petStats||"0").split('/')[0]);

const getWin = (v1, v2) => v1 > v2 ? ['winner', ''] : (v2 > v1 ? ['', 'winner'] : ['', '']);
let [c1, c2] = getWin(p1.percentage, p2.percentage); let [h1, h2] = getWin(p1H, p2H); let [pt1, pt2] = getWin(p1P, p2P);
let [d1, d2] = getWin(p1.donations||0, p2.donations||0); let [s1, s2] = getWin(p1.warStars||0, p2.warStars||0);

document.getElementById('compareDetailsGrid').innerHTML = `
<div class="player-card-inner" style="display:block;">
    <div class="compare-row"><div class="compare-val ${c1}">${parseFloat(p1.percentage)}%</div><div class="compare-label">Overall Completion</div><div class="compare-val ${c2}" style="color:var(--accent-secondary);">${parseFloat(p2.percentage)}%</div></div>
    <div class="compare-row"><div class="compare-val ${h1}">${p1.heroStats}</div><div class="compare-label">Total Hero Levels</div><div class="compare-val ${h2}" style="color:var(--accent-secondary);">${p2.heroStats}</div></div>
    <div class="compare-row"><div class="compare-val ${pt1}">${p1.petStats}</div><div class="compare-label">Total Pet Levels</div><div class="compare-val ${pt2}" style="color:var(--accent-secondary);">${p2.petStats}</div></div>
    <div class="compare-row"><div class="compare-val ${d1}">${(p1.donations||0).toLocaleString()}</div><div class="compare-label">Donations</div><div class="compare-val ${d2}" style="color:var(--accent-secondary);">${(p2.donations||0).toLocaleString()}</div></div>
    <div class="compare-row" style="border:none;"><div class="compare-val ${s1}">${(p1.warStars||0).toLocaleString()}</div><div class="compare-label">War Stars</div><div class="compare-val ${s2}" style="color:var(--accent-secondary);">${(p2.warStars||0).toLocaleString()}</div></div>
</div>`;

if (!p1.heroes || !p2.heroes) return;
let style = getComputedStyle(document.body); 
let c1Border = style.getPropertyValue('--accent-main').trim();
let c2Border = style.getPropertyValue('--accent-secondary').trim();

let rOpts = { animation: false, events: [], responsive: true, maintainAspectRatio: false, scales: { r: { max: 100, ticks: { display: false }, grid: { color: 'rgba(0, 229, 255, 0.1)' }, angleLines: { color: 'rgba(0, 229, 255, 0.1)' }, pointLabels: { color: style.getPropertyValue('--text-main').trim(), font: { size: 10, family: 'Montserrat' } } } }, plugins: { legend: { labels: { color: style.getPropertyValue('--text-main').trim(), font: { family: 'Montserrat', size: 12 } } } } };

chartsRegistry.radarHero = new Chart(document.getElementById('heroRadar').getContext('2d'), { type: 'radar', data: { labels: heroNames, datasets: [{ label: p1.name, data: heroNames.map(h => ((p1.heroes[h]||0)/maxLevelsMap[h])*100), backgroundColor: (ctx) => getRadarGradient(ctx, 'rgba(0, 229, 255, 0.4)', 'rgba(0, 229, 255, 0.0)'), borderColor: c1Border, borderWidth: 1.5, tension: 0.4 }, { label: p2.name, data: heroNames.map(h => ((p2.heroes[h]||0)/maxLevelsMap[h])*100), backgroundColor: (ctx) => getRadarGradient(ctx, 'rgba(179, 0, 255, 0.4)', 'rgba(179, 0, 255, 0.0)'), borderColor: c2Border, borderWidth: 1.5, tension: 0.4 }]}, options: rOpts });
chartsRegistry.radarPet = new Chart(document.getElementById('petRadar').getContext('2d'), { type: 'radar', data: { labels: petNames, datasets: [{ label: p1.name, data: petNames.map(p => ((p1.pets[p]||0)/maxLevelsMap[p])*100), backgroundColor: (ctx) => getRadarGradient(ctx, 'rgba(0, 229, 255, 0.4)', 'rgba(0, 229, 255, 0.0)'), borderColor: c1Border, borderWidth: 1.5, tension: 0.4 }, { label: p2.name, data: petNames.map(p => ((p2.pets[p]||0)/maxLevelsMap[p])*100), backgroundColor: (ctx) => getRadarGradient(ctx, 'rgba(179, 0, 255, 0.4)', 'rgba(179, 0, 255, 0.0)'), borderColor: c2Border, borderWidth: 1.5, tension: 0.4 }]}, options: rOpts });
}
</script>
</body>
</html>
