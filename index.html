<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
<meta name="theme-color" content="#090a0f">
<title>Molly Metrics V7</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── CSS VARIABLES ── */
:root {
  --bg-dark: #050608;
  --bg-card: rgba(13,15,23,0.85);
  --accent-main: #00e5ff;
  --accent-secondary: #b300ff;
  --text-main: #ffffff;
  --text-muted: #748293;
  --border-color: rgba(0,229,255,0.25);
  --card-shadow: 0 16px 40px rgba(0,0,0,0.9);
  --font-sans: 'Montserrat', sans-serif;
  --dot-green: #00ff88;
  --dot-red: #ff3366;
  --grade-s: #ffd700;
  --grade-a: #00e5ff;
  --grade-b: #00ff88;
  --grade-c: #ffcc00;
  --grade-d: #ff3366;
}
html, body {
  height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background-color: var(--bg-dark); font-family: var(--font-sans); color: var(--text-main);
  -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
}
h1, h2, h3, h4, p { margin: 0; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

/* ── BACKGROUND ── */
#app-background {
  position: fixed; inset: 0; z-index: -100;
  background-image: url('https://i.imgur.com/lK3ctDR.jpeg');
  background-size: cover; background-position: center;
  filter: grayscale(85%) sepia(15%) hue-rotate(200deg) brightness(0.15) contrast(1.4);
}
#app-background::after {
  content: ''; position: absolute; inset: 0;
  background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.5) 2px, rgba(0,0,0,0.5) 4px),
                    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 100% 100%, 40px 40px, 40px 40px; pointer-events: none; z-index: 1;
}

/* ── LAYOUT ── */
.main-scroll-area {
  position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px));
}
.container {
  padding: calc(32px + env(safe-area-inset-top, 0px)) 20px 32px 20px;
  max-width: 600px; margin: auto;
}
.section-title {
  text-align: center; color: var(--text-main); margin-top: 40px; margin-bottom: 8px;
  text-transform: uppercase; font-size: 14px; font-weight: 700; letter-spacing: 4px;
}
.section-subtitle {
  font-size: 9px; color: var(--text-muted); text-align: center; margin-bottom: 24px;
  text-transform: uppercase; letter-spacing: 1px;
}

/* ── CONTROLS ── */
.control-row { display: flex; gap: 12px; margin-bottom: 32px; align-items: center; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
input, select {
  width: 100%; padding: 8px 12px; border: none; background: transparent;
  color: var(--text-main); font-size: 13px; outline: none; font-family: var(--font-sans);
}
select { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--accent-main); }

/* ── GLASS GRID (ROSTER) ── */
.glass-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; width: 100%; perspective: 1200px; }
.glass-card {
  background: linear-gradient(145deg, rgba(18,20,28,0.9), rgba(9,10,15,0.95));
  border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.3s, border-color 0.3s;
  backdrop-filter: blur(16px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); position: relative;
}
.glass-card:hover { border-color: rgba(0,229,255,0.3); box-shadow: 0 15px 35px rgba(0,229,255,0.15); transform: translateY(-4px); }
.glass-ring {
  width: 44px; height: 44px; border-radius: 50%;
  background: conic-gradient(var(--accent-main) var(--pct), rgba(255,255,255,0.05) 0deg);
  display: flex; align-items: center; justify-content: center; margin-bottom: 14px; position: relative;
}
.glass-ring::before { content: ""; position: absolute; inset: 2px; background: #0b0c10; border-radius: 50%; }
.glass-ring span { position: relative; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
.glass-name { font-size: 11px; font-weight: 600; width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
.glass-th { font-size: 9px; color: var(--text-muted); margin-top: 6px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.growth-indicator { color: var(--dot-green); font-size: 10px; }

/* ── GRADE BADGES ── */
.grade-badge { position: absolute; top: 8px; right: 8px; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; }
.grade-S { background: rgba(255,215,0,0.15); color: var(--grade-s); border: 1px solid rgba(255,215,0,0.3); text-shadow: 0 0 8px var(--grade-s); }
.grade-A { background: rgba(0,229,255,0.12); color: var(--grade-a); border: 1px solid rgba(0,229,255,0.3); }
.grade-B { background: rgba(0,255,136,0.10); color: var(--grade-b); border: 1px solid rgba(0,255,136,0.25); }
.grade-C { background: rgba(255,204,0,0.10); color: var(--grade-c); border: 1px solid rgba(255,204,0,0.25); }
.grade-D { background: rgba(255,51,102,0.10); color: var(--grade-d); border: 1px solid rgba(255,51,102,0.25); }

/* ── BOTTOM SHEET MODAL ── */
.sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1500; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; backdrop-filter: blur(8px); }
.sheet-backdrop.active { opacity: 1; pointer-events: all; }
.bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, rgba(18,20,28,0.98), rgba(9,10,15,1));
  backdrop-filter: blur(30px); border-top-left-radius: 32px; border-top-right-radius: 32px; z-index: 2000;
  transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.2,0.8,0.2,1); max-height: 88vh; overflow-y: auto;
  padding: 40px 24px 24px 24px; border-top: 1px solid rgba(255,255,255,0.1); box-shadow: 0 -20px 60px rgba(0,0,0,0.9);
}
.bottom-sheet.open { transform: translateY(0); }
.close-btn { position: absolute; top: 20px; right: 24px; width: 36px; height: 36px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 24px; margin-bottom: 32px; }
.stat-box { background: rgba(0,0,0,0.4); border: 1px solid rgba(0,229,255,0.15); border-radius: 12px; padding: 16px 8px; text-align: center; }
.stat-label { font-size: 9px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.stat-val { font-size: 15px; color: var(--accent-main); font-weight: 700; text-shadow: 0 0 10px rgba(0,229,255,0.4); }

/* ── TROPHY ROOM (HALL OF FAME) ── */
.hof-card {
  background: linear-gradient(135deg, rgba(13,15,23,0.9), rgba(9,10,15,0.95));
  border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; margin-bottom: 16px;
}
.hof-header { font-size: 13px; font-weight: 700; color: var(--accent-main); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }
.hof-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.hof-row:last-child { border-bottom: none; }
.hof-rank { font-size: 14px; font-weight: 800; width: 24px; text-align: center; }
.hof-name { flex: 1; font-size: 12px; font-weight: 600; }
.hof-val { font-size: 14px; font-weight: 700; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.3); }

/* ── BOTTOM NAV ── */
.bottom-nav-wrapper { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: rgba(5,6,8,0.9); backdrop-filter: blur(24px); border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom, 0px); display: flex; justify-content: center;}
.bottom-nav { display: flex; width: 100%; max-width: 600px; padding: 12px 16px; justify-content: space-evenly; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-muted); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; padding: 8px 24px; transition: 0.3s; }
.nav-btn span { font-size: 22px; transition: transform 0.3s, filter 0.3s; }
.nav-btn.active { color: var(--accent-main); }
.nav-btn.active span { transform: translateY(-4px); filter: drop-shadow(0 0 10px var(--accent-main)); }
.tab-content { display: none; }
.tab-content.active { display: block; animation: fade 0.4s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── UTILS ── */
.loader-overlay { position: fixed; inset: 0; background: rgba(5,6,8,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
.loader-overlay.active { opacity: 1; pointer-events: all; }
.spinner { width: 50px; height: 50px; border: 3px solid rgba(0,229,255,0.2); border-top-color: var(--accent-main); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.refresh-btn { position: fixed; top: 16px; left: 16px; z-index: 900; background: rgba(0,0,0,0.6); border: 1px solid rgba(0,229,255,0.2); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
.refresh-btn.spinning { animation: spin 1s linear infinite; }
</style>
</head>
<body>

<div id="app-background"></div>
<div class="refresh-btn" id="refreshBtn" onclick="hardRefresh()">↺</div>

<div class="loader-overlay" id="loaderOverlay">
  <div class="spinner"></div>
  <p style="margin-top: 16px; font-size: 10px; letter-spacing: 2px; color: var(--accent-main);">SYNCING DB...</p>
</div>

<div class="main-scroll-area" id="mainScroll">
  <div class="container">
    
    <div id="roster-tab" class="tab-content active">
      <div style="text-align:center; margin-bottom:32px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:20px; padding:32px 20px; box-shadow:0 15px 40px rgba(0,0,0,0.8);">
        <h4 style="font-size:13px; font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:24px;">Global Progression</h4>
        <div style="font-size:36px; font-weight:800; color:var(--accent-main); text-shadow:0 0 15px rgba(0,229,255,0.4);" id="global-pct-val">0.0%</div>
        <div id="global-change-val" style="font-size:12px; color:var(--dot-green); margin-top:8px; font-weight:600;">+0.00% (30d)</div>
      </div>

      <div class="control-row" id="roster-controls" style="display:none;">
        <input type="text" id="searchInput" placeholder="Search Operators..." oninput="filterRoster()">
        <div style="width:1px; height:24px; background:rgba(255,255,255,0.1);"></div>
        <select id="sortSelect" onchange="filterRoster()">
          <option value="comp">Overall %</option>
          <option value="grade">Grade</option>
          <option value="th">Town Hall</option>
        </select>
      </div>

      <div id="roster-container" class="glass-grid">
        <p style="text-align:center; color:var(--text-muted); font-size:12px; grid-column:span 3; padding-top:40px;">Initializing matrix...</p>
      </div>
    </div>

    <div id="trophy-tab" class="tab-content">
      <h4 class="section-title">Hall of Fame</h4>
      <p class="section-subtitle">Top 3 Elite Operators per category</p>
      <div id="hof-container">
        <p style="text-align:center; color:var(--text-muted); font-size:12px; padding-top:40px;">Loading records...</p>
      </div>
    </div>

  </div>
</div>

<div class="bottom-nav-wrapper">
  <div class="bottom-nav">
    <div class="nav-btn active" onclick="switchTab('roster')"><span>🛡️</span> Roster</div>
    <div class="nav-btn" onclick="switchTab('trophy')"><span>🏆</span> Trophy Room</div>
  </div>
</div>

<div id="sheetBackdrop" class="sheet-backdrop" onclick="closeBottomSheet()"></div>
<div id="playerBottomSheet" class="bottom-sheet">
  <div class="close-btn" onclick="closeBottomSheet()">✕</div>
  <div id="bottomSheetContent"></div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw7ZpPJfVNu8afK61gVbKpFgk1XEh5kJmaZWryJ1oA83uu9Ujy4LnJou1yyg3i_hLFB/exec"; // Insert your deployed Google Apps Script URL

let globalPlayerData = [];
let hallOfFameData = {};
let displayedPlayerData = [];
let bsChart = null;

const gradeOrder = { S: 5, A: 4, B: 3, C: 2, D: 1, "N/A": 0 };

window.addEventListener('DOMContentLoaded', () => { fetchDashboardData(); });

function switchTab(tab) {
  document.querySelectorAll('.tab-content, .nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`${tab}-tab`).classList.add('active');
  document.querySelector(`.nav-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('mainScroll').scrollTop = 0;
}

async function fetchDashboardData() {
  document.getElementById('loaderOverlay').classList.add('active');
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  
  try {
    let res = await fetch(WEB_APP_URL + "?action=getDashboardData");
    let data = await res.json();
    
    if (data.players) {
      globalPlayerData = data.players;
      hallOfFameData = data.hallOfFame || {};
      
      let totalPct = 0, oldTotal = 0, progressing = 0;
      globalPlayerData.forEach(p => {
        totalPct += parseFloat(p.percentage);
        if (p.historyPcts && p.historyPcts.length > 0) {
          let old = parseFloat(p.historyPcts[0]);
          let curr = parseFloat(p.historyPcts[p.historyPcts.length - 1]);
          if (curr > old) { oldTotal += old; progressing++; }
        }
      });
      
      let avgPct = globalPlayerData.length > 0 ? (totalPct / globalPlayerData.length).toFixed(1) : 0;
      document.getElementById('global-pct-val').innerText = `${avgPct}%`;
      
      let change = progressing > 0 ? ((totalPct / globalPlayerData.length) - (oldTotal / progressing)).toFixed(2) : "0.00";
      let changeEl = document.getElementById('global-change-val');
      changeEl.innerText = (change >= 0 ? "+" : "") + change + "% (30d velocity)";
      changeEl.style.color = change >= 0 ? "var(--dot-green)" : "var(--dot-red)";

      document.getElementById('roster-controls').style.display = "flex";
      filterRoster();
      renderHallOfFame();
    }
  } catch (err) {
    console.error("Backend error:", err);
  }
  
  document.getElementById('loaderOverlay').classList.remove('active');
  btn.classList.remove('spinning');
}

async function hardRefresh() {
  document.getElementById('refreshBtn').classList.add('spinning');
  try {
    await fetch(WEB_APP_URL + "?action=clearCache");
    await fetchDashboardData();
  } catch (e) {
    document.getElementById('refreshBtn').classList.remove('spinning');
  }
}

function filterRoster() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  const sortBy = document.getElementById('sortSelect').value;
  
  displayedPlayerData = globalPlayerData.filter(p => p.name.toLowerCase().includes(term));
  
  displayedPlayerData.sort((a, b) => {
    if (sortBy === 'comp') return b.percentage - a.percentage;
    if (sortBy === 'grade') return (gradeOrder[b.grade] || 0) - (gradeOrder[a.grade] || 0);
    if (sortBy === 'th') return b.thLevel - a.thLevel;
    return 0;
  });
  
  renderPlayerCards();
}

function renderPlayerCards() {
  const container = document.getElementById('roster-container');
  if (displayedPlayerData.length === 0) {
    container.innerHTML = `<p style='text-align:center; color:var(--text-muted); width:100%; grid-column:span 3; padding-top:40px;'>No operators found.</p>`;
    return;
  }
  
  let html = "";
  displayedPlayerData.forEach(p => {
    let realIdx = globalPlayerData.findIndex(gp => gp.tag === p.tag);
    let growthIndicator = p.progression30d > 0 ? `<span class="growth-indicator">▲</span>` : '';
    let gradeCls = p.grade && p.grade !== "N/A" ? `grade-${p.grade}` : '';
    
    html += `
    <div class="glass-card" onclick="openBottomSheet(${realIdx})">
      ${p.grade && p.grade !== "N/A" ? `<div class="grade-badge ${gradeCls}">${p.grade}</div>` : ''}
      <div class="glass-ring" style="--pct:${p.percentage}%;">
        <span>${Math.floor(p.percentage)}%</span>
      </div>
      <div class="glass-name">${p.name}</div>
      <div class="glass-th">TH${p.thLevel} ${growthIndicator}</div>
    </div>`;
  });
  container.innerHTML = html;
}

function renderHallOfFame() {
  const container = document.getElementById('hof-container');
  if (Object.keys(hallOfFameData).length === 0) {
    container.innerHTML = `<p style='text-align:center; color:var(--text-muted); padding-top:40px;'>Awaiting sync.</p>`;
    return;
  }

  // Icons for achievements
  const icons = {
    "Sweet Victory!": "🏆 Trophies",
    "War League Legend": "🌟 CWL Stars",
    "Shattered and Scattered": "🎯 Scattershots Destroyed",
    "Anti-Artillery": "🦅 Eagle Artilleries Destroyed",
    "Sharing is caring": "🤝 Total Donations",
    "Heroic Heist": "💧 Dark Elixir Looted"
  };

  let html = "";
  for (let ach in hallOfFameData) {
    if (hallOfFameData[ach].length === 0) continue;
    
    let title = icons[ach] || ach;
    html += `<div class="hof-card">
      <div class="hof-header">${title}</div>`;
      
    hallOfFameData[ach].forEach((p, idx) => {
      let medal = idx === 0 ? "🥇" : idx === 1 ? "🥈" : "🥉";
      let formatVal = parseInt(p.value).toLocaleString();
      html += `
      <div class="hof-row">
        <div class="hof-rank">${medal}</div>
        <div class="hof-name">${p.name} <span style="font-size:9px; color:var(--text-muted);">TH${p.th}</span></div>
        <div class="hof-val">${formatVal}</div>
      </div>`;
    });
    html += `</div>`;
  }
  container.innerHTML = html;
}

function openBottomSheet(index) {
  let p = globalPlayerData[index];
  let gradeCls = p.grade && p.grade !== "N/A" ? `grade-${p.grade}` : '';
  
  let html = `
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <div>
        <h2 style="font-size:24px; font-weight:800;">${p.name}</h2>
        <div style="color:var(--accent-main); font-size:12px; font-weight:600; margin-top:4px;">
          <span style="color:var(--text-muted);">TH${p.thLevel}</span> • ${p.percentage}% OVERALL
        </div>
        <div style="font-size:10px; color:var(--dot-green); margin-top:8px; font-weight:600;">+${p.progression30d}% (30d Velocity)</div>
      </div>
      <div style="text-align:center;">
        <div class="grade-badge ${gradeCls}" style="font-size:22px; padding:6px 12px; border-radius:8px; position:static;">${p.grade || 'N/A'}</div>
      </div>
    </div>
    
    <h4 style="font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:12px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:8px;">Combat Diagnostics</h4>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">Heroes</div><div class="stat-val">${p.heroes}</div></div>
      <div class="stat-box"><div class="stat-label">Equipment</div><div class="stat-val">${p.equipment}</div></div>
      <div class="stat-box"><div class="stat-label">Pets</div><div class="stat-val">${p.pets}</div></div>
      <div class="stat-box"><div class="stat-label">Troops</div><div class="stat-val">${p.troops}</div></div>
      <div class="stat-box"><div class="stat-label">Spells</div><div class="stat-val">${p.spells}</div></div>
      <div class="stat-box"><div class="stat-label">Donations</div><div class="stat-val">${(p.donations||0).toLocaleString()}</div></div>
    </div>
    
    <h4 style="font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:16px;">30-Day Trajectory</h4>
    <div style="height:200px; width:100%; position:relative; margin-bottom:32px;"><canvas id="bsHistoryChart"></canvas></div>
  `;
  
  document.getElementById('bottomSheetContent').innerHTML = html;
  document.getElementById('playerBottomSheet').classList.add('open');
  document.getElementById('sheetBackdrop').classList.add('active');
  
  if (bsChart) bsChart.destroy();
  if (p.historyDates && p.historyDates.length > 0) {
    let ctx = document.getElementById('bsHistoryChart').getContext('2d');
    
    let grad = ctx.createLinearGradient(0, 0, 0, 200);
    grad.addColorStop(0, 'rgba(0,229,255,0.4)');
    grad.addColorStop(1, 'rgba(0,229,255,0.0)');
    
    Chart.defaults.color = '#748293';
    Chart.defaults.font.family = "'Montserrat', sans-serif";
    
    bsChart = new Chart(ctx, {
      type: 'line',
      data: { 
        labels: p.historyDates, 
        datasets: [{ 
          data: p.historyPcts, borderColor: '#00e5ff', backgroundColor: grad, 
          borderWidth: 2, fill: true, tension: 0.3, pointBackgroundColor: '#00e5ff', pointRadius: 3 
        }] 
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { 
          x: { grid: { display: false }, ticks: { font: { size: 9 } } }, 
          y: { grid: { color: 'rgba(255,255,255,0.05)' }, border: { display: false } } 
        }
      }
    });
  }
}

function closeBottomSheet() {
  document.getElementById('playerBottomSheet').classList.remove('open');
  document.getElementById('sheetBackdrop').classList.remove('active');
}
</script>
</body>
</html>
