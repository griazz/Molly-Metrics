<html>
<head>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root {
--bg-dark: #0a0505; --bg-card: rgba(45, 15, 20, 0.15); --accent-main: #d4af37; --accent-secondary: #9c7f23;
--text-main: #f0e6e6; --text-muted: #8c7e7e; --border-color: rgba(212, 175, 55, 0.25); --card-shadow: 0 16px 40px rgba(0, 0, 0, 0.8);
--gradient-main: linear-gradient(135deg, rgba(30, 10, 15, 0.8), rgba(15, 5, 8, 0.9));
--chart-line: #d4af37; --chart-fill: rgba(212, 175, 55, 0.1); --header-bg: rgba(10, 5, 5, 0.85);
--transition-speed: 0.4s; --glow-accent: 0 0 25px rgba(212, 175, 55, 0.15); --glow-border: rgba(212, 175, 55, 0.4);
--font-serif: 'Playfair Display', serif; --font-sans: 'Montserrat', sans-serif;
--dot-green: #4caf50; --dot-yellow: #ffb300; --dot-red: #e53935;
}

body.light-mode {
--bg-dark: #fbf9f6; --bg-card: rgba(240, 235, 235, 0.4); --accent-main: #b89028;
--text-main: #1a1515; --text-muted: #7a6a6a; --border-color: rgba(184, 144, 40, 0.3);
--card-shadow: 0 16px 40px rgba(0, 0, 0, 0.05); --gradient-main: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(240, 235, 235, 0.9));
--chart-line: #b89028; --chart-fill: rgba(184, 144, 40, 0.1); --header-bg: rgba(251, 249, 246, 0.85);
--glow-accent: 0 0 20px rgba(184, 144, 40, 0.15); --glow-border: rgba(184, 144, 40, 0.4);
}

html, body {
height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background-color: var(--bg-dark); transition: background-color var(--transition-speed) ease;
font-family: var(--font-sans); font-weight: 300; color: var(--text-main); -webkit-font-smoothing: antialiased;
-webkit-tap-highlight-color: transparent;
}

h1, h2, h3, h4, .section-title, .player-info { font-family: var(--font-serif); font-weight: 400; margin: 0; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg-dark); } ::-webkit-scrollbar-thumb { background: var(--accent-secondary); border-radius: 3px; }

#app-background { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -100; background-image: url('https://i.imgur.com/lK3ctDR.jpeg'); background-size: cover; background-position: center;
filter: grayscale(80%) sepia(30%) hue-rotate(320deg) brightness(0.25); transition: background-image 0.4s ease-in-out; }

.main-scroll-area { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-y: none; padding-bottom: calc(120px + env(safe-area-inset-bottom, 0px)); box-sizing: border-box; }

.loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 5, 5, 0.8); backdrop-filter: blur(16px);
z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
.loader-overlay.active { opacity: 1; pointer-events: all; }
.loader { width: 50px; aspect-ratio: 1.154; display: grid; color: #E5C158; will-change: transform;
background: linear-gradient(to bottom left, transparent calc(50% - 1px), currentColor 0 calc(50% + 1px), transparent 0) right/50% 100%, linear-gradient(to bottom right, transparent calc(50% - 1px), currentColor 0 calc(50% + 1px), transparent 0) left /50% 100%, linear-gradient(currentColor 0 0) bottom/100% 2px;
background-repeat: no-repeat; transform-origin: 50% 66%; animation: l5 4s infinite linear; margin-bottom: 32px; }
.loader::before, .loader::after { content: ""; grid-area: 1/1; background: inherit; transform-origin: inherit; animation: inherit; }
.loader::after { animation-duration: 2s; } @keyframes l5{ 100% {transform:rotate(1turn)} }
.loader-text { font-family: var(--font-sans); font-size: 12px; font-weight: 400; letter-spacing: 4px; text-transform: uppercase; color: var(--accent-main); }

.container { padding: calc(32px + env(safe-area-inset-top, 0px)) max(20px, env(safe-area-inset-right, 0px)) 32px max(20px, env(safe-area-inset-left, 0px)); max-width: 600px; margin: auto; }
input, select { width: 100%; padding: 16px; margin-bottom: 0; border: 1px solid var(--border-color); border-radius: 12px; background-color: var(--bg-card); color: var(--text-main);
box-sizing: border-box; font-size: 14px; outline: none; transition: all 0.4s ease; backdrop-filter: blur(16px); }
.control-row { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
.control-row input { flex: 1; margin-bottom: 0; }
.control-row select { flex-shrink: 0; width: auto; font-size: 11px; letter-spacing: 1px; margin-bottom: 0;}
.compare-btn { flex-shrink:0; padding:16px 20px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:12px; color:var(--accent-main); font-family:var(--font-sans); font-size:11px; text-transform:uppercase; letter-spacing:1px; cursor:pointer; backdrop-filter: blur(16px); transition: all 0.3s ease; }
.compare-btn:active { transform: scale(0.95); }

/* V2 Player Cards (No Accordion) */
.player-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; margin-bottom: 16px; box-shadow: var(--card-shadow); overflow: hidden; transition: transform var(--transition-speed) ease; backdrop-filter: blur(16px); contain: layout style; cursor: pointer; }
.player-card:active { transform: scale(0.98); }
.card-header { padding: 16px 20px; display: flex; flex-direction: column; }
.player-info { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; font-size: 18px; letter-spacing: 1.5px;}
.progress-bg { background-color: rgba(0,0,0,0.4); border: 1px solid var(--border-color); border-radius: 100px; width: 100%; height: 6px; overflow: hidden; margin-top: 8px; }
.progress-fill { background: linear-gradient(90deg, #BF953F 0%, #FCF6BA 50%, #BF953F 100%); background-size: 200% 100%; height: 100%; border-radius: 100px; transition: width 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: var(--glow-accent); animation: shimmerLiquid 4s infinite linear; will-change: width; }
@keyframes shimmerLiquid { 0% { background-position: 200% 0; } 100% { background-position: 0 0; } }

/* V2 Bottom Sheet Modal */
.sheet-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1500; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
.sheet-backdrop.active { opacity: 1; pointer-events: all; }
.bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--header-bg); backdrop-filter: blur(24px); border-top-left-radius: 24px; border-top-right-radius: 24px; z-index: 2000; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); max-height: 85vh; overflow-y: auto; padding: 20px; box-sizing: border-box; border-top: 1px solid var(--border-color); box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
.bottom-sheet.open { transform: translateY(0); }
.sheet-handle { width: 40px; height: 5px; background: var(--text-muted); border-radius: 3px; margin: 0 auto 20px auto; opacity: 0.5; cursor: pointer;}

.stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 16px; margin-bottom: 24px;}
.stat-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; text-align: center; }
.stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.stat-val { font-size: 13px; color: var(--accent-main); font-family: var(--font-sans); }

.chart-container { margin-top: 24px; position: relative; width: 100%; }
.compare-row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border-color); align-items: center; }
.compare-label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); flex: 1; text-align: center; letter-spacing: 1px;}
.compare-val { font-size: 16px; width: 30%; text-align: center; transition: color 0.4s ease; font-family: var(--font-sans); letter-spacing: 1px;}
.compare-val.winner { color: var(--accent-main); }
.radar-container { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: var(--card-shadow); backdrop-filter: blur(16px); padding: 24px 0; margin-top: 24px; height: 340px; position: relative; width: 100%; box-sizing: border-box; }

.bottom-nav-wrapper { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; z-index: 1000; background: var(--header-bg); backdrop-filter: blur(24px); border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom, 0px); }
.bottom-nav { display: flex; width: 100%; max-width: 600px; padding: 6px 4px; gap: 2px; }
.nav-btn { flex: 1; padding: 8px 1px; text-align: center; color: var(--text-muted); font-size: 8px; cursor: pointer; transition: all 0.4s ease; border-radius: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; text-transform: uppercase; letter-spacing: 1px; font-weight: 400; }
.nav-btn span { font-size: 14px; }
.nav-btn:active { transform: scale(0.92); }
.nav-btn.active { color: var(--bg-dark); background: var(--accent-main); box-shadow: var(--glow-accent); }

.tab-content { display: none; animation: tabEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); min-height: calc(100% + 1px); }
.tab-content.active { display: block; }
@keyframes tabEnter { from { opacity: 0; transform: translateY(12px) scale(0.98); filter: blur(4px); } to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }

.section-title { text-align: center; color: var(--text-muted); margin-top: 32px; margin-bottom: 24px; text-transform:uppercase; font-size: 16px; letter-spacing: 4px; }
.board-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(212, 175, 55, 0.1); align-items: center; font-size: 13px;}
.board-val { color: var(--accent-main); font-family: var(--font-sans); }

.status-badge { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 100px; font-size: 9px; font-weight: 400; letter-spacing: 1.5px; text-transform: uppercase; }
.badge-inactive { background: rgba(255,152,0,0.15); border: 1px solid rgba(255,152,0,0.35); color: #ffb74d; }
.badge-hit-rate { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.35); color: #81c784; }
.filter-chips { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 12px; scrollbar-width: none; -ms-overflow-style: none; }
.filter-chips::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; padding: 6px 14px; border-radius: 100px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border-color); color: var(--text-muted); background: transparent; transition: all 0.3s ease; }
.chip.active { background: var(--accent-main); color: var(--bg-dark); border-color: var(--accent-main); }

/* V2 CWL Carousel & War Room */
.cwl-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 16px; padding-bottom: 16px; scrollbar-width: none; -ms-overflow-style: none; margin-top: 16px;}
.cwl-carousel::-webkit-scrollbar { display: none; }
.carousel-slide { min-width: 100%; scroll-snap-align: center; box-sizing: border-box; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; box-shadow: var(--card-shadow); backdrop-filter: blur(16px); }
.war-room-header { background: linear-gradient(135deg, rgba(30,10,15,0.9), rgba(10,5,5,0.95)); border: 1px solid var(--accent-main); border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1); }
.strike-pill { flex-shrink:0; background:rgba(0,0,0,0.4); border:1px solid var(--border-color); padding:8px 16px; border-radius:100px; font-size:11px; color:var(--text-main); font-family:var(--font-sans); }

.circular-progress { width: 100px; height: 100px; border-radius: 50%; background: conic-gradient(var(--accent-main) var(--progress), rgba(255,255,255,0.05) 0deg); display: flex; align-items: center; justify-content: center; position: relative; box-shadow: var(--glow-accent); flex-shrink: 0; }
.circular-progress::before { content: ""; position: absolute; inset: 6px; background: var(--bg-card); border-radius: 50%; backdrop-filter: blur(16px); }
.circular-value { position: relative; font-size: 20px; font-weight: 500; color: var(--text-main); font-family: var(--font-sans); }
.time-to-max-banner { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; text-align: center; margin-bottom: 24px; margin-top: 8px;}
</style>
</head>
<body>

<div id="app-background"></div>

<div class="loader-overlay" id="loaderOverlay">
<div class="loader"></div>
<div class="loader-text" id="loaderText">Establishing Link...</div>
</div>

<div class="main-scroll-area" id="mainScroll">
<div class="container">

<div id="roster-tab" class="tab-content">
  
<div class="player-card" style="padding: 24px; text-align: center; cursor: default;">
    <h4 style="color: var(--text-muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;">Active Roster Progression</h4>
    <div style="display: flex; justify-content: center; align-items: center; gap: 24px;">
        <div class="circular-progress" id="global-circle" style="--progress: 0%;">
            <div class="circular-value" id="global-pct-val">0%</div>
        </div>
        <div style="text-align: left;">
            <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">30-Day Growth</div>
            <div id="global-change-val" style="font-size: 18px; font-weight: 500;">+0.00%</div>
            <div style="font-size: 9px; color: var(--text-muted); margin-top: 6px;" id="global-progress-count">0 Operators Advancing</div>
        </div>
    </div>
</div>

<div class="filter-chips" id="roster-filter-chips" style="display:none;">
  <div class="chip active" data-filter="all" onclick="setRosterFilter('all')">All</div>
  <div class="chip" data-filter="cwl" onclick="setRosterFilter('cwl')">CWL</div>
  <div class="chip" data-filter="inactive" onclick="setRosterFilter('inactive')">Inactive</div>
</div>
<div class="control-row" id="roster-controls" style="display:none;">
<input type="text" id="searchInput" placeholder="Search Clan Roster..." oninput="debouncedFilterRoster()">
<select id="sortSelect" onchange="filterRoster()">
<option value="comp">Overall %</option>
<option value="hero">Hero %</option>
<option value="pet">Pet %</option>
</select>
<button class="compare-btn" onclick="toggleCompareMode()">Compare</button>
</div>

<div id="roster-compare-section" style="display:none;">
  <div style="display:flex; gap: 16px; margin-bottom: 24px;">
  <div style="flex:1;"><label style="font-size: 10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:8px;">Player 1</label><select id="player1Select" onchange="comparePlayers()"><option>Loading...</option></select></div>
  <div style="flex:1;"><label style="font-size: 10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:8px;">Player 2</label><select id="player2Select" onchange="comparePlayers()"><option>Loading...</option></select></div>
  </div>
  <div id="radarSection" style="display:none;">
  <h4 class="section-title" style="margin-top:0;">Head-to-Head Stats</h4>
  <div class="player-card" style="padding: 0 20px; cursor: default;" id="compareDetailsGrid"></div>
  <h4 class="section-title">Hero Distribution (%)</h4>
  <div class="radar-container"><canvas id="heroRadar"></canvas></div>
  <h4 class="section-title">Pet Distribution (%)</h4>
  <div class="radar-container"><canvas id="petRadar"></canvas></div>
  </div>
</div>

<div id="roster-container"><p style="text-align:center; color: var(--text-muted); font-size: 12px; letter-spacing: 2px;">Preparing roster...</p></div>
</div>

<div id="war-tab" class="tab-content active">
<div id="war-container"><p style="text-align:center; color: var(--text-muted); font-size: 12px; letter-spacing: 2px; margin-top:40px;">Fetching CWL Database...</p></div>
</div>

</div>
</div>

<div class="bottom-nav-wrapper">
<div class="bottom-nav">
<div class="nav-btn" onclick="switchTab('roster')"><span style="font-size:16px;">🛡</span> Roster</div>
<div class="nav-btn active" onclick="switchTab('war')"><span style="font-size:16px;">⚔</span> War Room</div>
</div>
</div>

<div id="sheetBackdrop" class="sheet-backdrop" onclick="closeBottomSheet()"></div>
<div id="playerBottomSheet" class="bottom-sheet">
  <div class="sheet-handle" onclick="closeBottomSheet()"></div>
  <div id="bottomSheetContent"></div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw7ZpPJfVNu8afK61gVbKpFgk1XEh5kJmaZWryJ1oA83uu9Ujy4LnJou1yyg3i_hLFB/exec";

function debounce(fn, delay) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
}
const debouncedFilterRoster = debounce(() => filterRoster(), 250);

let globalPlayerData = [];
let displayedPlayerData = [];
let clanData = {};
let warInfo = null;
let legacyData = null;
let chartsRegistry = { radarHero: null, radarPet: null, cwlLineChart: null };
let sheetCharts = { history: null, hero: null, pet: null }; // Recycled charts for Bottom Sheet
let currentRosterFilter = 'all';

const CWL_TAGS = ["#PG0R8GQPQ", "#YCRV8GP0U", "#RYPU89Y8", "#99JQPVU9Q", "#GRJRUYP0", "#8QGVV099U", "#2RL2JGJPJ", "#Y8LY2VUJ9", "#GYJ00RJ2Q", "#G9YR000R8", "#20YLLYC9P", "#QVCLVUQVY", "#9LGG22Q28", "#GGULC2CR", "#9R0C82GU"];

const maxLevelsMap = {
"Barbarian King": 105, "Archer Queen": 105, "Grand Warden": 80, "Royal Champion": 55, "Minion Prince": 95, "Dragon Duke": 25,
"Electro Owl": 15, "Unicorn": 15, "Frosty": 15, "Diggy": 10, "Phoenix": 10, "Spirit Fox": 10, "Angry Jelly": 10, "Sneezy": 10, "Greedy Raven": 10
};
const heroNames = ["Barbarian King", "Archer Queen", "Grand Warden", "Royal Champion", "Minion Prince", "Dragon Duke"];
const petNames = ["Electro Owl", "Unicorn", "Frosty", "Diggy", "Phoenix", "Spirit Fox", "Angry Jelly", "Sneezy", "Greedy Raven"];

const tabBackgrounds = { 'roster': "url('https://i.imgur.com/bHVXaoS.jpeg')", 'war': "url('https://i.imgur.com/lK3ctDR.jpeg')" };

function formatMonth(m) {
    if(!m) return "N/A";
    let d = new Date(m);
    if (!isNaN(d.getTime())) return d.toLocaleString('default', { month: 'short', year: 'numeric' });
    let parts = m.toString().split('-');
    if(parts.length >= 2) {
        let date = new Date(parts[0], parseInt(parts[1]) - 1);
        return date.toLocaleString('default', { month: 'short', year: 'numeric' });
    }
    return m;
}

function countUp(elId, endVal, isPct, prefix="") {
const el = document.getElementById(elId); if(!el) return;
let duration = 2500, start = 0, startTime = null, end = parseFloat(endVal) || 0;
const step = (t) => {
if(!startTime) startTime = t; let p = Math.min((t - startTime)/duration, 1), ease = 1 - Math.pow(1 - p, 3);
let curr = start + ease * (end - start);
el.innerText = prefix + (isPct ? curr.toFixed(1) + '%' : Math.floor(curr));
if(p < 1) requestAnimationFrame(step); else el.innerText = prefix + (isPct ? end.toFixed(1) + '%' : end);
}; requestAnimationFrame(step);
}

Chart.defaults.color = '#8c7e7e'; Chart.defaults.font.family = "'Montserrat', sans-serif";

function toggleTheme(userTriggered = false) {
let isLight = document.body.classList.toggle('light-mode');
if(userTriggered) localStorage.setItem('molly-theme', isLight ? 'light' : 'dark');
let style = getComputedStyle(document.body);
Chart.defaults.color = style.getPropertyValue('--text-muted').trim();
Chart.defaults.borderColor = style.getPropertyValue('--border-color').trim();
if(globalPlayerData.length > 0) {
if(document.getElementById('roster-tab').classList.contains('active')) filterRoster();
if(document.getElementById('roster-compare-section').style.display === 'block') comparePlayers();
}
}

window.addEventListener('DOMContentLoaded', () => {
if(localStorage.getItem('molly-theme') === 'light') toggleTheme(false);
Chart.defaults.borderColor = getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim();
fetchDashboardData(); 
});

function showLoader(text) { document.getElementById('loaderText').innerText = text || "Establishing Link..."; document.getElementById('loaderOverlay').classList.add('active'); }
function hideLoader() { document.getElementById('loaderOverlay').classList.remove('active'); }

function switchTab(tab) {
if (tabBackgrounds[tab]) document.getElementById('app-background').style.backgroundImage = tabBackgrounds[tab];
document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
document.getElementById(`${tab}-tab`).classList.add('active');
document.querySelector(`.nav-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
document.getElementById('mainScroll').scrollTop = 0;
if ((tab === 'roster' || tab === 'war') && globalPlayerData.length === 0) fetchDashboardData();

// Snap carousel if War tab
if(tab === 'war') {
    setTimeout(() => {
        let carousel = document.getElementById('cwlCarousel');
        if(carousel) {
            let activeSlide = carousel.querySelector('.carousel-slide.active');
            if (activeSlide) carousel.scrollTo({ left: activeSlide.offsetLeft - 16, behavior: 'smooth' });
        }
    }, 150);
}
}

async function fetchDashboardData(callback) {
showLoader("Crunching Roster Data...");
try {
  let res = await fetch(WEB_APP_URL + "?action=getDashboardData");
  let data = await res.json();
  if (data.error) throw new Error(data.error);

  if(data && data.players) {
    globalPlayerData = data.players;
    clanData = data;
    warInfo = data.warInfo || { type: "NONE", data: null };
    legacyData = data.legacyData || {};

    let progressingPlayers = 0;
    let currentTotal = 0;
    let oldTotal = 0;

    globalPlayerData.forEach(p => {
        let pcts = p.historyPcts || [];
        if (pcts.length > 0) {
            let curr = parseFloat(pcts[pcts.length - 1]);
            let old = parseFloat(pcts[0]);
            if (curr > old) {
                progressingPlayers++;
                currentTotal += curr;
                oldTotal += old;
            }
        }
    });

    let currentGlobal = progressingPlayers > 0 ? (currentTotal / progressingPlayers) : 0;
    let oldGlobal = progressingPlayers > 0 ? (oldTotal / progressingPlayers) : 0;
    let change = currentGlobal - oldGlobal;

    document.getElementById('global-circle').style.setProperty('--progress', `${currentGlobal}%`);
    countUp('global-pct-val', currentGlobal, true);
    
    let changeEl = document.getElementById('global-change-val');
    changeEl.innerText = (change >= 0 ? "+" : "") + change.toFixed(2) + "%";
    changeEl.style.color = change >= 0 ? "var(--dot-green)" : "var(--dot-red)";
    document.getElementById('global-progress-count').innerText = `${progressingPlayers} Operators Advancing`;

    document.getElementById('roster-controls').style.display = globalPlayerData.length > 0 ? "flex" : "none";
    document.getElementById('roster-filter-chips').style.display = globalPlayerData.length > 0 ? "flex" : "none";

    filterRoster(); renderWar();
  }
  hideLoader();
  if(callback) callback();
} catch (err) {
  hideLoader(); 
  alert("Backend Crash: " + err.message);
}
}

function filterRoster() {
const searchTerm = document.getElementById('searchInput').value.toLowerCase();
const sortBy = document.getElementById('sortSelect').value;

let pool;
if (currentRosterFilter === 'inactive') pool = globalPlayerData.filter(p => p.isInactive);
else if (currentRosterFilter === 'cwl') pool = globalPlayerData.filter(p => CWL_TAGS.includes(p.tag));
else pool = globalPlayerData;

displayedPlayerData = pool.filter(p => p.name.toLowerCase().includes(searchTerm));

displayedPlayerData.sort((a, b) => {
if (sortBy === 'comp') return b.percentage - a.percentage;
if (sortBy === 'hero') { let aH = parseInt((a.heroStats||"0").split('/')[0]); let bH = parseInt((b.heroStats||"0").split('/')[0]); return bH - aH; }
if (sortBy === 'pet') { let aP = parseInt((a.petStats||"0").split('/')[0]); let bP = parseInt((b.petStats||"0").split('/')[0]); return bP - aP; }
return 0;
});
renderPlayerCards();
}

function renderEntityBarChart(ctx, entityObj, upgradingCounts = {}) {
let style = getComputedStyle(document.body);
let sortedEntities = Object.keys(entityObj).map(name => ({ name: name, pct: ((entityObj[name] / (maxLevelsMap[name]||100)) * 100) })).sort((a, b) => b.pct - a.pct);
let labels = sortedEntities.map(e => upgradingCounts[e.name] ? e.name + upgradingCounts[e.name] : e.name);
let dataPct = sortedEntities.map(e => e.pct.toFixed(1));
let bgColors = dataPct.map(pct => parseFloat(pct) >= 100 ? '#7a8c66' : style.getPropertyValue('--chart-line').trim());
return new Chart(ctx, { 
type: 'bar', data: { labels: labels, datasets: [{ data: dataPct, backgroundColor: bgColors, borderRadius: 4 }] }, 
options: { indexAxis: 'y', animation: false, events: [], responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { max: 100, display:false }, y: { border: { display: false }, grid: { display: false }, ticks: { font: { family: 'Montserrat', size: 10 } } } } }, 
plugins: [{ id: 'barInsideLabels', afterDatasetsDraw(chart) { const { ctx, data } = chart; ctx.save(); ctx.font = '300 10px "Montserrat"'; ctx.textBaseline = 'middle'; chart.getDatasetMeta(0).data.forEach((bar, index) => { const val = data.datasets[0].data[index]; const isMaxed = parseFloat(val) >= 100; let displayStr = isMaxed ? "MAX" : parseFloat(val).toString(); const fullTextWidth = ctx.measureText(displayStr).width; const isInside = bar.width > fullTextWidth + 12; let textX; if (isInside) { ctx.textAlign = 'right'; textX = bar.x - 8; ctx.fillStyle = isMaxed ? '#0a0505' : '#1a1515'; } else { ctx.textAlign = 'left'; textX = bar.x + 8; ctx.fillStyle = style.getPropertyValue('--text-muted').trim(); } ctx.fillText(displayStr, textX, bar.y + 1); }); ctx.restore(); } }] });

function renderLineChart(ctx, labels, dataPoints, labelName) {

let grad = ctx.createLinearGradient(0, 0, 0, 200); grad.addColorStop(0, style.getPropertyValue('--chart-fill').trim()); grad.addColorStop(1, 'rgba(255,255,255,0)');
let pointColors = dataPoints.map((_, i) => (i === 0 || i === dataPoints.length - 1) ? accentColor : lineColor);

return new Chart(ctx, { 
type: 'line', data: { labels: labels, datasets: [{ label: labelName, data: dataPoints, borderColor: lineColor, backgroundColor: grad, borderWidth: 2, fill: true, tension: 0.4, pointBackgroundColor: pointColors, pointBorderColor: pointColors, pointRadius: pointRadii, pointHoverRadius: 5 }] },

plugins: [{ id: 'floatingLabels', afterDatasetsDraw(chart) { const { ctx, data } = chart; const meta = chart.getDatasetMeta(0); if(!meta.data || meta.data.length === 0) return; ctx.save(); let currentStyle = getComputedStyle(document.body); let textFill = currentStyle.getPropertyValue('--text-main').trim(); let accColor = currentStyle.getPropertyValue('--accent-main').trim(); ctx.textBaseline = 'middle'; const firstIdx = 0; const lastIdx = meta.data.length - 1; const ptFirst = meta.data[firstIdx]; const ptLast = meta.data[lastIdx]; const valFirst = parseFloat(data.datasets[0].data[firstIdx]); const valLast = parseFloat(data.datasets[0].data[lastIdx]); ctx.font = '300 10px "Montserrat"'; ctx.textAlign = 'left'; ctx.fillStyle = textFill; ctx.fillText(valLast, ptLast.x + 8, ptLast.y); if (lastIdx > 0) { ctx.textAlign = 'right'; ctx.fillText(valFirst, ptFirst.x - 8, ptFirst.y); let diff = parseFloat((valLast - valFirst).toFixed(2)); if (diff !== 0) { let diffText = diff > 0 ? `+${diff}` : `${diff}`; ctx.textAlign = 'center'; ctx.fillStyle = diff > 0 ? accColor : '#a64d4d'; ctx.font = '300 11px "Montserrat"'; let midX = (ptFirst.x + ptLast.x) / 2; let midY = (ptFirst.y + ptLast.y) / 2 - 15; ctx.fillText(diffText, midX, midY); } } ctx.restore(); } }] });
}

(round.enemyLineup || []).forEach(e => {
let atkStatus = e.attacks > 0 ? `<span style="color:var(--dot-red);">⚔️</span>` : `<span style="color:var(--text-muted);">💤</span>`;
let ironCladHtml = (e.defenses && e.defenses > 1) ? `<span style="background:rgba(156,127,35,0.15); color:var(--accent-main); border:1px solid rgba(212,175,55,0.3); padding:2px 6px; border-radius:4px; font-size:8px; margin-left:4px;">🛡️ Iron Clad (${e.defenses})</span>` : '';

rosterHtml += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(212,175,55,0.1); font-size:11px; align-items:center;">
<div>
<span style="color:var(--text-muted); width:24px; display:inline-block;">#${e.mapPosition}</span>
${e.name} <span style="color:var(--accent-main); font-size:9px; margin-left:4px;">TH${e.th}</span>
${ironCladHtml}
</div>
<div>${atkStatus}</div>
</div>`;
});
rosterHtml += `</div>`;

html += `
<div class="carousel-slide ${isCurrent ? 'active' : ''}">
  <div style="display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid var(--border-color); padding-bottom:12px; margin-bottom:16px;">
    <div style="font-size:14px; font-weight:500;">Round ${index + 1}: ${round.opponent.name}</div>
    <div style="font-size:9px; color:var(--accent-main); text-transform:uppercase; letter-spacing:1px;">${round.state}</div>
  </div>
  ${patHtml}
  ${thHtml}
  ${rosterHtml}
</div>`;
});

html += `</div>`; // End Carousel

if (clanData.cwlHistoricalStats && clanData.cwlHistoricalStats.length > 0) {
  html += `<h4 class="section-title" style="margin-top:48px;">Historical CWL Performance</h4>`;
  html += `<div class="player-card" style="padding: 20px;"><div class="chart-container" style="height: 180px; margin-top:0;"><canvas id="cwlHistoryChart"></canvas></div></div>`;
  
  clanData.cwlHistoricalStats.forEach(season => {
    let posColor = season.position === 1 ? "var(--accent-main)" : (season.position <= 2 ? "var(--dot-green)" : (season.position >= 7 ? "var(--dot-red)" : "var(--text-main)"));
    html += `
    <div class="cwl-round-card" style="margin-bottom:12px;">
      <div class="cwl-round-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <div class="cwl-team-vs">${formatMonth(season.season)} <span style="font-size:9px; color:var(--text-muted); font-weight:normal; margin-left:8px; text-transform:uppercase;">${season.league}</span></div>
        <div class="cwl-round-status" style="color:${posColor}">Pos: ${season.position}</div>
      </div>
      <div class="cwl-round-body">
        <div class="stat-grid" style="margin-top:16px;">
          <div class="stat-box"><div class="stat-label">Stars</div><div class="stat-val">${season.stars}</div></div>
          <div class="stat-box"><div class="stat-label">3★ Hits</div><div class="stat-val">${season.threeStars}</div></div>
          <div class="stat-box"><div class="stat-label">Record</div><div class="stat-val">${season.wins}W - ${season.losses}L</div></div>
        </div>
      </div>
    </div>`;
  });
}

container.innerHTML = html;

// Render CWL Line Chart
if (clanData.cwlHistoricalStats && clanData.cwlHistoricalStats.length > 0) {
  let chartData = [...clanData.cwlHistoricalStats].reverse();
  let dates = chartData.map(s => formatMonth(s.season));
  let stars = chartData.map(s => s.stars);
  let ctx = document.getElementById('cwlHistoryChart');
  if (ctx) {
      if (chartsRegistry.cwlLineChart) chartsRegistry.cwlLineChart.destroy();
      chartsRegistry.cwlLineChart = renderLineChart(ctx.getContext('2d'), dates, stars, 'CWL Stars');
  }
}
}

function toggleCompareMode() {
    let compSec = document.getElementById('roster-compare-section');
    let rosterCont = document.getElementById('roster-container');
    if (compSec.style.display === 'none') {
        compSec.style.display = 'block';
        rosterCont.style.display = 'none';
        populateVersusDropdowns();
    } else {
        compSec.style.display = 'none';
        rosterCont.style.display = 'block';
    }
}

function populateVersusDropdowns() {
var sel1 = document.getElementById('player1Select'), sel2 = document.getElementById('player2Select');
sel1.innerHTML = ""; sel2.innerHTML = "";
let validPlayers = globalPlayerData.filter(p => CWL_TAGS.includes(p.tag));
if (validPlayers.length === 0) validPlayers = globalPlayerData;
validPlayers.forEach((p, i) => { sel1.add(new Option(p.name, i)); sel2.add(new Option(p.name, i)); });
if(validPlayers.length > 1) sel2.selectedIndex = 1; comparePlayers();
}

const getRadarGradient = (context, colorStart, colorEnd) => {
const chartArea = context.chart.chartArea; if (!chartArea) return colorStart; const ctx = context.chart.ctx; const centerX = (chartArea.left + chartArea.right) / 2;
const centerY = (chartArea.top + chartArea.bottom) / 2; const r = Math.min(chartArea.right - chartArea.left, chartArea.bottom - chartArea.top) / 2;
const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, r); gradient.addColorStop(0, colorStart); gradient.addColorStop(1, colorEnd); return gradient;
};

function comparePlayers() {
let validPlayers = globalPlayerData.filter(p => CWL_TAGS.includes(p.tag));
if (validPlayers.length === 0) validPlayers = globalPlayerData;
let p1 = validPlayers[document.getElementById('player1Select').value], p2 = validPlayers[document.getElementById('player2Select').value];
if(!p1 || !p2) return;
document.getElementById('radarSection').style.display = "block";
if (chartsRegistry.radarHero) chartsRegistry.radarHero.destroy(); if (chartsRegistry.radarPet) chartsRegistry.radarPet.destroy();

let p1H = parseInt((p1.heroStats||"0").split('/')[0]), p2H = parseInt((p2.heroStats||"0").split('/')[0]);
let p1P = parseInt((p1.petStats||"0").split('/')[0]), p2P = parseInt((p2.petStats||"0").split('/')[0]);

const getWin = (v1, v2) => v1 > v2 ? ['winner', ''] : (v2 > v1 ? ['', 'winner'] : ['', '']);
let [c1, c2] = getWin(p1.percentage, p2.percentage); let [h1, h2] = getWin(p1H, p2H); let [pt1, pt2] = getWin(p1P, p2P);
let [d1, d2] = getWin(p1.donations||0, p2.donations||0); let [s1, s2] = getWin(p1.warStars||0, p2.warStars||0);

document.getElementById('compareDetailsGrid').innerHTML = `
<div class="compare-row"><div class="compare-val ${c1}">${parseFloat(p1.percentage)}%</div><div class="compare-label">Overall Completion</div><div class="compare-val ${c2}">${parseFloat(p2.percentage)}%</div></div>
<div class="compare-row"><div class="compare-val ${h1}">${p1.heroStats}</div><div class="compare-label">Total Hero Levels</div><div class="compare-val ${h2}">${p2.heroStats}</div></div>
<div class="compare-row"><div class="compare-val ${pt1}">${p1.petStats}</div><div class="compare-label">Total Pet Levels</div><div class="compare-val ${pt2}">${p2.petStats}</div></div>
<div class="compare-row"><div class="compare-val ${d1}">${(p1.donations||0).toLocaleString()}</div><div class="compare-label">Donations</div><div class="compare-val ${d2}">${(p2.donations||0).toLocaleString()}</div></div>
<div class="compare-row"><div class="compare-val ${s1}">${(p1.warStars||0).toLocaleString()}</div><div class="compare-label">War Stars</div><div class="compare-val ${s2}">${(p2.warStars||0).toLocaleString()}</div></div>`;

if (!p1.heroes || !p2.heroes) return;
let style = getComputedStyle(document.body); 
let rOpts = { animation: false, events: [], responsive: true, maintainAspectRatio: false, scales: { r: { max: 100, ticks: { display: false }, grid: { color: 'rgba(212, 175, 55, 0.1)' }, angleLines: { color: 'rgba(212, 175, 55, 0.1)' }, pointLabels: { color: style.getPropertyValue('--text-main').trim(), font: { size: 10, family: 'Montserrat' } } } }, plugins: { legend: { labels: { color: style.getPropertyValue('--text-main').trim(), font: { family: 'Montserrat', size: 12 } } } } };
chartsRegistry.radarHero = new Chart(document.getElementById('heroRadar').getContext('2d'), { type: 'radar', data: { labels: heroNames, datasets: [{ label: p1.name, data: heroNames.map(h => ((p1.heroes[h]||0)/maxLevelsMap[h])*100), backgroundColor: (ctx) => getRadarGradient(ctx, 'rgba(212, 175, 55, 0.4)', 'rgba(212, 175, 55, 0.0)'), borderColor: style.getPropertyValue('--chart-line'), borderWidth: 1.5, tension: 0.4 }, { label: p2.name, data: heroNames.map(h => ((p2.heroes[h]||0)/maxLevelsMap[h])*100), backgroundColor: 'rgba(200, 190, 190, 0.1)', borderColor: style.getPropertyValue('--text-muted'), borderWidth: 1.5, tension: 0.4 }]}, options: rOpts });
chartsRegistry.radarPet = new Chart(document.getElementById('petRadar').getContext('2d'), { type: 'radar', data: { labels: petNames, datasets: [{ label: p1.name, data: petNames.map(p => ((p1.pets[p]||0)/maxLevelsMap[p])*100), backgroundColor: (ctx) => getRadarGradient(ctx, 'rgba(212, 175, 55, 0.4)', 'rgba(212, 175, 55, 0.0)'), borderColor: style.getPropertyValue('--chart-line'), borderWidth: 1.5, tension: 0.4 }, { label: p2.name, data: petNames.map(p => ((p2.pets[p]||0)/maxLevelsMap[p])*100), backgroundColor: 'rgba(200, 190, 190, 0.1)', borderColor: style.getPropertyValue('--text-muted'), borderWidth: 1.5, tension: 0.4 }]}, options: rOpts });
}
</script>
</body>
</html>
