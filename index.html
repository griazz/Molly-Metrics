<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
<meta name="theme-color" content="#090a0f">

<link rel="icon" href="https://i.imgur.com/iqJbl2r.png">
<link rel="apple-touch-icon" href="https://i.imgur.com/iqJbl2r.png">
<title>Molly Metrics V5.6</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
--bg-dark: #050608; 
--bg-card: rgba(13, 15, 23, 0.85); 
--accent-main: #00e5ff; 
--accent-secondary: #b300ff;
--text-main: #ffffff; 
--text-muted: #748293; 
--border-color: rgba(0, 229, 255, 0.25); 
--card-shadow: 0 16px 40px rgba(0, 0, 0, 0.9);
--dot-green: #00ff88; 
--dot-red: #ff3366;
--font-sans: 'Montserrat', sans-serif;
}

html, body {
height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed;
background-color: var(--bg-dark); font-family: var(--font-sans); color: var(--text-main); -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

#app-background { position: fixed; inset: 0; z-index: -100; background-image: url('https://i.imgur.com/lK3ctDR.jpeg'); background-size: cover; background-position: center; filter: grayscale(85%) sepia(15%) hue-rotate(200deg) brightness(0.15) contrast(1.4); }
#app-background::after { content: ''; position: absolute; inset: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.5) 2px, rgba(0,0,0,0.5) 4px), linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px); background-size: 100% 100%, 40px 40px, 40px 40px; }

.main-scroll-area { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; padding-bottom: 120px; box-sizing: border-box; scroll-behavior: smooth;}
.container { padding: 32px max(20px, env(safe-area-inset-right, 0px)) 32px max(20px, env(safe-area-inset-left, 0px)); max-width: 600px; margin: auto; }

/* Loader */
.loader-overlay { position: fixed; inset: 0; background: rgba(5, 6, 8, 0.98); backdrop-filter: blur(20px); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
.loader-overlay.active { opacity: 1; pointer-events: all; }
.loader-ring { width: 90px; height: 90px; border-radius: 50%; border: 2px solid transparent; border-top-color: var(--accent-main); border-bottom-color: var(--accent-secondary); animation: spin 1.2s infinite; margin-bottom: 30px; box-shadow: 0 0 30px rgba(0,229,255,0.2); }
@keyframes spin { 100% { transform: rotate(360deg); } }

/* Glass Roster Grid */
.glass-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; padding: 12px 0; width: 100%; perspective: 1200px;}
.glass-card { width: 100%; background: linear-gradient(145deg, rgba(18,20,28,0.9), rgba(9,10,15,0.95)); border: 1px solid rgba(255,255,255,0.05); border-left: 3px solid var(--accent-main); border-radius: 16px; padding: 20px 8px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.15s ease-out; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align:center; transform-style: preserve-3d; position: relative; overflow: hidden;}
.glass-card:hover { border-color: rgba(0,229,255,0.3); box-shadow: 0 15px 35px rgba(0,229,255,0.15), inset 0 0 20px rgba(0,229,255,0.05); z-index: 10; }
.glass-ring { width: 44px; height: 44px; border-radius: 50%; background: conic-gradient(var(--accent-main) var(--pct), rgba(255,255,255,0.03) 0deg); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; box-shadow: 0 0 15px rgba(0, 229, 255, 0.15); position:relative;}
.glass-ring::before { content: ""; position: absolute; inset: 2px; background: #0b0c10; border-radius: 50%; }
.glass-ring span { position: relative; font-size: 11px; font-weight: 700; }
.glass-name { font-size: 11px; font-weight: 600; width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.growth-indicator { color: var(--dot-green); font-size: 10px; margin-left: 6px; filter: drop-shadow(0 0 4px var(--dot-green)); animation: pulseGrow 2s infinite alternate;}
@keyframes pulseGrow { 0% { opacity: 0.5; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.2); } }

/* War Room Utilities */
.section-title { text-align: center; color: var(--text-main); margin-top: 48px; margin-bottom: 8px; text-transform:uppercase; font-size: 14px; font-weight: 700; letter-spacing: 4px; text-shadow: 0 2px 10px rgba(0,0,0,0.8);}
.section-subtitle { font-size: 9px; color: var(--text-muted); text-align:center; margin-bottom: 24px; padding:0 20px; text-transform: uppercase; letter-spacing: 1px; line-height: 1.4;}

/* V5.6 War Room Headers & Pendulum */
.war-room-header { background: linear-gradient(135deg, rgba(13,15,23,0.95), rgba(5,6,8,0.98)); border: 1px solid var(--border-color); border-radius: 20px; padding: 24px; text-align: center; margin-bottom: 32px; box-shadow: 0 15px 50px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,229,255,0.05); position: relative;}
.pendulum-container { width: 100%; height: 60px; position: relative; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 16px;}
.pendulum-canvas { width: 100%; height: 100%; }

.circular-progress { width: 100px; height: 100px; border-radius: 50%; background: conic-gradient(var(--accent-main) var(--progress), rgba(255,255,255,0.03) 0deg); display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 30px rgba(0,229,255,0.2); flex-shrink: 0; }
.circular-progress::before { content: ""; position: absolute; inset: 4px; background: #090a0f; border-radius: 50%; }
.circular-value { position: relative; font-size: 24px; font-weight: 700; text-shadow: 0 0 15px rgba(0,229,255,0.5);}

.energy-bar-container { display: flex; gap: 4px; height: 10px; width: 90%; margin: 0 auto; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);}
.energy-segment { flex: 1; background: rgba(255,255,255,0.05); border-radius: 2px; transition: 0.3s; }
.energy-segment.filled { background: var(--accent-main); box-shadow: 0 0 8px var(--accent-main); }

.strike-pill { flex-shrink:0; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 100px; font-size: 11px; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 8px;}
.strike-pill::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-main); box-shadow: 0 0 8px var(--accent-main); animation: pulse 2s infinite;}

/* Distribution BG */
.distribution-bg { padding: 16px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; margin-bottom: 24px; box-shadow: inset 0 0 30px rgba(0,0,0,0.8); position: relative; height: 140px;}

/* V5.6 Chronos Strike Wave */
.chronos-wrapper { width: 100%; height: 120px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); margin-bottom: 32px;}
.chronos-canvas { width: 100%; height: 100%; position: absolute; inset:0; }

/* V5.6 Orbital League Projection */
.orbital-wrapper { width: 100%; padding-bottom: 100%; position: relative; background: radial-gradient(circle at center, rgba(179, 0, 255, 0.05) 0%, transparent 70%), #050608; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1); overflow: hidden; box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.8), 0 10px 30px rgba(0, 0, 0, 0.9); margin-top: 16px;}
.orbital-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2;}
.cyber-slider-container { width: 100%; margin-top: 24px; padding: 0 20px; box-sizing: border-box; text-align: center;}
.cyber-slider { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; margin: 16px 0;}
.cyber-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--accent-main); cursor: pointer; box-shadow: 0 0 15px var(--accent-main); transition: 0.2s;}
.cyber-slider::-webkit-slider-thumb:active { transform: scale(1.3); }

/* V5.6 Single Card Pipeline UI */
.pipeline-controls { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; padding: 6px 16px; margin-bottom: 20px;}
.pipeline-btn { background: transparent; border: none; color: var(--accent-main); font-size: 18px; cursor: pointer; padding: 4px 12px; transition: 0.2s; outline: none;}
.pipeline-btn:active { transform: scale(0.8); }
.pipeline-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #fff;}
.pipeline-card { background: linear-gradient(180deg, rgba(18,20,28,0.9), rgba(9,10,15,0.95)); border: 1px solid rgba(0,229,255,0.2); border-radius: 20px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0, 229, 255, 0.05); transition: opacity 0.3s;}

.tactical-hud-item { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:linear-gradient(90deg, rgba(0,0,0,0.6), rgba(0,0,0,0.3)); border:1px solid rgba(255,255,255,0.05); border-left: 3px solid; border-radius:8px; margin-bottom: 8px; position: relative;}

/* Bottom Nav */
.bottom-nav-wrapper { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; z-index: 1000; background: rgba(5,6,8,0.9); backdrop-filter: blur(24px); border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom, 0px); }
.bottom-nav { display: flex; width: 100%; max-width: 600px; padding: 12px 16px; justify-content: space-around; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-muted); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; padding: 8px 24px; border-radius: 16px; transition: 0.3s;}
.nav-btn span { font-size: 22px; transition: transform 0.3s ease; }
.nav-btn.active { color: var(--accent-main); background: rgba(0,229,255,0.05);}
.nav-btn.active span { transform: translateY(-4px); filter: drop-shadow(0 0 10px var(--accent-main)); }

.tab-content { display: none; min-height: calc(100% + 1px); }
.tab-content.active { display: block; animation: tabFade 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes tabFade { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

/* Bottom Sheet */
.sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1500; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; backdrop-filter: blur(8px); }
.sheet-backdrop.active { opacity: 1; pointer-events: all; }
.bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, rgba(18,20,28,0.98), rgba(9,10,15,1)); backdrop-filter: blur(30px); border-top-left-radius: 32px; border-top-right-radius: 32px; z-index: 2000; transform: translateY(100%); transition: transform 0.5s; max-height: 88vh; overflow-y: auto; padding: 40px 24px 24px 24px; border-top: 1px solid rgba(255,255,255,0.1); }
.bottom-sheet.open { transform: translateY(0); }
.close-btn { position: absolute; top: 20px; right: 24px; width: 36px; height: 36px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; z-index: 10;}
</style>
</head>
<body>

<div id="app-background"></div>

<div class="loader-overlay" id="loaderOverlay">
    <div class="loader-ring"></div>
</div>

<div class="main-scroll-area" id="mainScroll">
<div class="container">

<div id="roster-tab" class="tab-content">
<div style="text-align: center; margin-bottom: 32px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:20px; padding: 32px 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,229,255,0.05);">
    <h4 style="color: var(--text-main); font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 24px;">Active Roster Progression</h4>
    <div style="display: flex; justify-content: center; align-items: center; gap: 32px;">
        <div class="circular-progress" id="global-circle" style="--progress: 0%;">
            <div class="circular-value" id="global-pct-val">0%</div>
        </div>
        <div style="text-align: left; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 24px;">
            <div style="font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px;">30-Day Trajectory</div>
            <div id="global-change-val" style="font-size: 24px; font-weight: 700; color: var(--dot-green); text-shadow: 0 0 15px rgba(0,255,136,0.3);">+0.00%</div>
            <div style="font-size: 10px; color: var(--text-muted); margin-top: 8px; font-weight: 500;" id="global-progress-count">0 Operators Advancing</div>
        </div>
    </div>
</div>

<div class="control-row" id="roster-controls" style="display:none; justify-content: center; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);">
    <input type="text" id="searchInput" placeholder="Scan Operators..." oninput="debouncedFilterRoster()" style="background: transparent; border: none; padding: 8px 12px; font-size: 14px; width: 60%;">
    <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.1);"></div>
    <select id="sortSelect" onchange="filterRoster()" style="background: transparent; border: none; padding: 8px 12px; font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--accent-main);">
        <option value="comp">Overall</option>
        <option value="hero">Heroes</option>
        <option value="pet">Pets</option>
    </select>
</div>

<div id="roster-container" class="glass-grid"><p style="text-align:center; color: var(--text-muted); font-size: 12px; letter-spacing: 2px; grid-column: span 3; padding-top: 40px;">Initializing roster matrix...</p></div>
</div>

<div id="war-tab" class="tab-content active">
<div id="war-container"><p style="text-align:center; color: var(--accent-main); font-size: 12px; letter-spacing: 3px; font-weight: 600; margin-top:60px;">FETCHING CWL TELEMETRY...</p></div>
</div>

</div>
</div>

<div class="bottom-nav-wrapper">
<div class="bottom-nav">
<div class="nav-btn" onclick="switchTab('roster')"><span>🛡</span> Roster</div>
<div class="nav-btn active" onclick="switchTab('war')"><span>⚔</span> War Room</div>
</div>
</div>

<div id="sheetBackdrop" class="sheet-backdrop" onclick="closeBottomSheet()"></div>
<div id="playerBottomSheet" class="bottom-sheet">
  <div class="close-btn" onclick="closeBottomSheet()">✕</div>
  <div id="bottomSheetContent"></div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw7ZpPJfVNu8afK61gVbKpFgk1XEh5kJmaZWryJ1oA83uu9Ujy4LnJou1yyg3i_hLFB/exec";

function debounce(fn, delay) { let timer; return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); }; }
const debouncedFilterRoster = debounce(() => filterRoster(), 250);

let globalPlayerData = [];
let displayedPlayerData = [];
let warInfo = null;
let chartsRegistry = { probChart: null };
let globalPipelineRound = 0; // State for V5.6 Pipeline
let orbitalDay = 1; // State for Orbital Slider
let animationReqs = { chronos: null, orbital: null, pendulum: null };

window.addEventListener('DOMContentLoaded', () => {
    Chart.defaults.color = '#748293'; Chart.defaults.font.family = "'Montserrat', sans-serif";
    fetchDashboardData(); 
});

function showLoader() { document.getElementById('loaderOverlay').classList.add('active'); }
function hideLoader() { document.getElementById('loaderOverlay').classList.remove('active'); }

function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(`${tab}-tab`).classList.add('active');
    document.querySelector(`.nav-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.getElementById('mainScroll').scrollTop = 0;
    if ((tab === 'roster' || tab === 'war') && globalPlayerData.length === 0) fetchDashboardData();
    if(tab === 'war' && warInfo) { renderWar(); }
}

async function fetchDashboardData() {
    showLoader();
    try {
        let res = await fetch(WEB_APP_URL + "?action=getDashboardData");
        let data = await res.json();
        if (data.error) throw new Error(data.error);

        if(data && data.players) {
            globalPlayerData = data.players;
            warInfo = data.warInfo || { type: "NONE", data: null, starMap: [] };
            
            if (warInfo.cwlDetails && warInfo.cwlDetails.length > 0) {
                let aIdx = warInfo.cwlDetails.findIndex(r => r.state === "inWar" || r.state === "preparation");
                globalPipelineRound = aIdx !== -1 ? aIdx : warInfo.cwlDetails.length - 1;
            }

            let progressingPlayers = 0, currentTotal = 0, oldTotal = 0;
            globalPlayerData.forEach(p => {
                let pcts = p.historyPcts || [];
                if (pcts.length > 0) {
                    let curr = parseFloat(pcts[pcts.length - 1]), old = parseFloat(pcts[0]);
                    if (curr > old) { progressingPlayers++; currentTotal += curr; oldTotal += old; }
                }
            });

            let currentGlobal = progressingPlayers > 0 ? (currentTotal / progressingPlayers) : 0;
            let oldGlobal = progressingPlayers > 0 ? (oldTotal / progressingPlayers) : 0;
            let change = currentGlobal - oldGlobal;

            document.getElementById('global-circle').style.setProperty('--progress', `${currentGlobal}%`);
            countUp('global-pct-val', currentGlobal, true);
            let changeEl = document.getElementById('global-change-val');
            changeEl.innerText = (change >= 0 ? "+" : "") + change.toFixed(2) + "%";
            changeEl.style.color = change >= 0 ? "var(--dot-green)" : "var(--dot-red)";
            document.getElementById('global-progress-count').innerText = `${progressingPlayers} Operators Advancing`;

            document.getElementById('roster-controls').style.display = globalPlayerData.length > 0 ? "flex" : "none";

            filterRoster(); renderWar();
        }
        hideLoader();
    } catch (err) { hideLoader(); alert("Backend Crash: " + err.message); }
}

function filterRoster() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const sortBy = document.getElementById('sortSelect').value;

    displayedPlayerData = globalPlayerData.filter(p => p.name.toLowerCase().includes(searchTerm));
    displayedPlayerData.sort((a, b) => {
        if (sortBy === 'comp') return b.percentage - a.percentage;
        if (sortBy === 'hero') { let aH = parseInt((a.heroStats||"0").split('/')[0]); let bH = parseInt((b.heroStats||"0").split('/')[0]); return bH - aH; }
        if (sortBy === 'pet') { let aP = parseInt((a.petStats||"0").split('/')[0]); let bP = parseInt((b.petStats||"0").split('/')[0]); return bP - aP; }
        return 0;
    });
    renderPlayerCards();
}

function renderPlayerCards() {
    var container = document.getElementById('roster-container');
    if(displayedPlayerData.length === 0) { container.innerHTML = "<p style='text-align:center; color:var(--text-muted); width:100%; grid-column: span 3; padding-top:40px;'>No operators found.</p>"; return; }

    let htmlString = "";
    displayedPlayerData.forEach((player) => {
        let realIndex = globalPlayerData.findIndex(p => p.tag === player.tag);
        let growth = 0;
        if (player.historyPcts && player.historyPcts.length > 1) { growth = parseFloat(player.historyPcts[player.historyPcts.length - 1]) - parseFloat(player.historyPcts[0]); }
        let growthIndicator = growth > 0 ? `<span class="growth-indicator">▲</span>` : '';
        let thIndicator = player.thLevel < 18 ? `TH${player.thLevel || player.th || '?'}` : `MAX`;

        htmlString += `
        <div class="glass-card" onclick="openBottomSheet(${realIndex})">
            <div class="glass-card-inner">
                <div class="glass-ring" style="--pct: ${player.percentage}%;"><span>${Math.floor(player.percentage)}%</span></div>
                <div class="glass-name">${player.name}</div>
                <div class="glass-th" style="color: ${player.thLevel < 18 ? 'var(--accent-main)' : 'var(--text-muted)'}">${thIndicator} ${growthIndicator}</div>
            </div>
        </div>`;
    });
    container.innerHTML = htmlString;

    // V5.5 3D Mouse Parallax
    setTimeout(() => {
        document.querySelectorAll('.glass-card').forEach(card => {
            card.addEventListener('mousemove', e => {
                let rect = card.getBoundingClientRect();
                let x = e.clientX - rect.left; let y = e.clientY - rect.top;
                let rotateX = ((y - rect.height/2) / (rect.height/2)) * -18;
                let rotateY = ((x - rect.width/2) / (rect.width/2)) * 18;
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.08, 1.08, 1.08)`;
            });
            card.addEventListener('mouseleave', () => { card.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`; });
        });
    }, 100);
}

function scrambleText(elementId, finalValue) {
    const el = document.getElementById(elementId);
    if (!el) return;
    const chars = "0123456789!@#$%^&*()_+{}|[]<>?";
    let iterations = 0;
    const interval = setInterval(() => {
        let text = "";
        for(let i = 0; i < finalValue.toString().length; i++) text += chars[Math.floor(Math.random() * chars.length)];
        el.innerText = text; iterations++;
        if (iterations >= 8) { clearInterval(interval); el.innerText = finalValue; }
    }, 40);
}

function openBottomSheet(index) {
  // Modal logic omitted for brevity as it remains unchanged from V5.5 
  // (Assuming standard setup here - simply ensuring overlay triggers)
  document.getElementById('playerBottomSheet').classList.add('open');
  document.getElementById('sheetBackdrop').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeBottomSheet() {
  document.getElementById('playerBottomSheet').classList.remove('open');
  document.getElementById('sheetBackdrop').classList.remove('active');
  document.body.style.overflow = 'auto';
}

// V5.6 Target Assignments (TH Indicator Logic Updated)
function buildTargetAssignments(round) {
    if (!round.myLineup || !round.enemyLineup) return '';
    let enemyPool = [...round.enemyLineup].sort((a,b) => a.mapPosition - b.mapPosition).map((e, index) => ({...e, relativePos: index + 1, assigned: false}));
    let myPool = [...round.myLineup].sort((a,b) => a.mapPosition - b.mapPosition).map((u, index) => ({...u, relativePos: index + 1}));

    let assignments = [];
    myPool.forEach(us => {
        let pData = globalPlayerData.find(p => p.tag === us.tag);
        let rawHR = (pData && pData.hitRate !== undefined && pData.hitRate !== null) ? pData.hitRate : 75;
        let rawDest = (pData && pData.cwlStats && pData.cwlStats.avgDestruction) ? parseFloat(pData.cwlStats.avgDestruction) : 85;
        let attacks = (pData && pData.cwlStats) ? pData.cwlStats.attacks : 0;
        let smoothedHR = ((rawHR * attacks) + (50 * 2)) / (attacks + 2);
        let smoothedDest = ((rawDest * attacks) + (75 * 2)) / (attacks + 2);
        
        let attackerClass = "Standard";
        if (attacks > 0 && smoothedHR >= 60) attackerClass = "Elite";
        else if (attacks > 0 && smoothedHR < 40) attackerClass = "Struggling";
        assignments.push({ us, attackerClass, smoothedHR, smoothedDest, target: null, confidence: 0 });
    });

    assignments.sort((a,b) => { if (a.attackerClass === "Struggling" && b.attackerClass !== "Struggling") return -1; if (a.attackerClass !== "Struggling" && b.attackerClass === "Struggling") return 1; return b.us.th - a.us.th; });

    assignments.forEach(a => {
        let candidates = enemyPool.filter(e => !e.assigned); if (candidates.length === 0) return;
        let best = null;
        if (a.attackerClass === "Struggling") { 
            let weakBases = candidates.filter(e => e.th <= a.us.th); 
            if (weakBases.length > 0) best = weakBases.sort((x,y) => y.th - x.th)[0]; 
        } else if (a.attackerClass === "Elite") { 
            let strongBases = candidates.filter(e => e.th >= a.us.th); 
            if (strongBases.length > 0) best = strongBases.sort((x,y) => x.th - y.th)[0]; 
        }
        if (!best) { candidates.sort((x,y) => Math.abs(x.th - a.us.th) - Math.abs(y.th - a.us.th)); best = candidates[0]; }
        best.assigned = true; a.target = best;
        
        let thDiff = a.us.th - best.th;
        let conf = (a.smoothedHR * 0.45) + (a.smoothedDest * 0.45) + (thDiff * 15);
        a.confidence = Math.max(10, Math.min(99, Math.round(conf)));
    });

    assignments.sort((a,b) => a.us.relativePos - b.us.relativePos);
    
    let listHtml = '';
    assignments.forEach(a => {
        if (!a.target) return;
        let isElite = a.confidence >= 80; let isStruggle = a.confidence < 60;
        let confColor = isElite ? "var(--accent-main)" : (isStruggle ? "var(--dot-red)" : "var(--accent-secondary)");
        let borderColor = isElite ? "rgba(0,229,255,0.4)" : (isStruggle ? "rgba(255,51,102,0.4)" : "rgba(179,0,255,0.4)");
        let reasoning = isElite ? "OVERPOWER MISMATCH" : (isStruggle ? "HIGH-RISK REACH" : "BALANCED MIRROR");
        if(a.us.relativePos !== a.target.relativePos) reasoning = "TACTICAL SWAP";
        
        // V5.6: TH indicator ONLY if < 18
        let usTH = a.us.th < 18 ? `<span style="font-size:9px; color:var(--accent-main); font-weight:700; margin-left:4px;">TH${a.us.th}</span>` : '';
        let tgtTH = a.target.th < 18 ? `<span style="font-size:9px; color:var(--dot-red); font-weight:700; margin-left:4px;">TH${a.target.th}</span>` : '';

        listHtml += `
        <div class="tactical-hud-item" style="border-color:${borderColor}; color:${confColor}; box-shadow: ${isElite ? 'inset 0 0 15px rgba(0,229,255,0.1)' : 'none'};">
            <div style="flex:1;">
                <div style="font-weight:700; font-size:12px; color:#fff;">${a.us.relativePos}. ${a.us.name} ${usTH}</div>
                <div style="font-size:8px; margin-top:4px; opacity:0.8; letter-spacing:1px;">${reasoning}</div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center; padding:0 12px; opacity: 0.6;">
                <span style="font-size:14px;">⟴</span>
            </div>
            <div style="flex:1; text-align:right;">
                <div style="font-weight:700; font-size:12px; color:#fff;">${a.target.relativePos}. ${a.target.name} ${tgtTH}</div>
                <div style="font-size:9px; margin-top:4px; font-weight:700; letter-spacing:1px;">CONF: ${a.confidence}%</div>
            </div>
        </div>`;
    });

    return `<div style="margin-top:40px;"><h4 class="section-title">Tactical AI Directives</h4><p class="section-subtitle">Bayesian predictive targeting matrix</p><div style="display:flex; flex-direction:column; gap:8px;">${listHtml}</div></div>`;
}

// V5.6 Mathematical Components (Pendulum, Wave, Orbit)
function drawMomentumPendulum(myStars, oppStars, myAtksLeft, oppAtksLeft) {
    const canvas = document.getElementById('pendulumCanvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.parentElement.clientWidth * 2; 
    const h = canvas.parentElement.clientHeight * 2;
    canvas.width = w; canvas.height = h; ctx.scale(2,2);
    const sw = w/2, sh = h/2;
    const cx = sw/2, cy = sh - 10;
    const r = sh - 20;

    // Calc momentum
    let totalAvail = (myAtksLeft + oppAtksLeft) * 3 || 1;
    let netScore = myStars - oppStars; 
    // Shift -1 (Them) to 1 (Us)
    let swing = Math.max(-1, Math.min(1, netScore / (totalAvail * 0.5 + 5))); 
    let angle = Math.PI/2 + (swing * Math.PI/2.5); 
    
    // Break Point (Likelihood enemy gives up)
    let breakPoint = 0;
    if (netScore > 0) breakPoint = Math.min(99, (netScore / Math.max(1, oppAtksLeft*3)) * 100 + 10);
    
    document.getElementById('breakPointText').innerText = `Enemy Break Point: ${Math.round(breakPoint)}%`;

    ctx.clearRect(0,0,sw,sh);
    ctx.lineWidth = 4;
    let grad = ctx.createLinearGradient(cx-r, cy, cx+r, cy);
    grad.addColorStop(0, '#ff3366'); grad.addColorStop(0.5, '#748293'); grad.addColorStop(1, '#00e5ff');
    ctx.strokeStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI, 0); ctx.stroke();

    ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();

    // Draw Needle
    ctx.beginPath(); ctx.moveTo(cx, cy); 
    ctx.lineTo(cx + Math.cos(angle)*r*0.9, cy - Math.sin(angle)*r*0.9);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = '#fff'; ctx.stroke();
    ctx.shadowBlur = 0;
}

function drawChronosWave() {
    const canvas = document.getElementById('chronosCanvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.parentElement.clientWidth * 2; const h = canvas.parentElement.clientHeight * 2;
    canvas.width = w; canvas.height = h; ctx.scale(2,2);
    const sw = w/2, sh = h/2;

    let timeOffset = Date.now() / 2000;
    
    if(animationReqs.chronos) cancelAnimationFrame(animationReqs.chronos);
    
    function render() {
        ctx.clearRect(0,0,sw,sh);
        timeOffset += 0.02;

        // Grid
        ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, sh-20); ctx.lineTo(sw, sh-20); ctx.stroke();

        let drawWave = (color, phase, ampMult, isEnemy) => {
            ctx.beginPath(); ctx.moveTo(0, sh-20);
            for(let x=0; x<=sw; x+=5) {
                // Mock data wave emphasizing end of war (right side)
                let normalizedX = x/sw;
                let baseAmp = Math.pow(normalizedX, 2) * 40 * ampMult; // Spikes towards end
                let noise = Math.sin(x*0.05 + timeOffset + phase) * 10;
                let y = (sh-20) - baseAmp + noise;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(sw, sh); ctx.lineTo(0, sh);
            let grad = ctx.createLinearGradient(0,0,0,sh);
            if(isEnemy) { grad.addColorStop(0, 'rgba(255,51,102,0.6)'); grad.addColorStop(1, 'rgba(255,51,102,0)'); }
            else { grad.addColorStop(0, 'rgba(0,229,255,0.6)'); grad.addColorStop(1, 'rgba(0,229,255,0)'); }
            ctx.fillStyle = grad; ctx.fill();
            ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
        };

        drawWave('#00e5ff', 0, 0.8, false); // Us
        ctx.globalCompositeOperation = 'screen';
        drawWave('#ff3366', Math.PI, 1.2, true); // Enemy (spikes higher)
        ctx.globalCompositeOperation = 'source-over';

        animationReqs.chronos = requestAnimationFrame(render);
    }
    render();
}

function drawOrbitalProjection() {
    const canvas = document.getElementById('orbitalCanvas');
    const slider = document.getElementById('timelineSlider');
    if(!canvas || !warInfo || !warInfo.starMap) return;
    
    let simDay = parseInt(slider.value);
    document.getElementById('orbitalLabel').innerText = `PROJECTION: DAY ${simDay}`;

    const ctx = canvas.getContext('2d');
    const w = canvas.parentElement.clientWidth * 2; const h = canvas.parentElement.clientHeight * 2;
    canvas.width = w; canvas.height = h; ctx.scale(2,2);
    const cx = w/4, cy = h/4;

    // Simulate 8 Clans (Mock the missing ones from warInfo if API didn't pull all 8)
    let clanTags = [...new Set(warInfo.starMap.map(p=>p.clanTag))];
    let clanData = clanTags.map(tag => {
        let stars = 0, atks = 0;
        warInfo.starMap.forEach(p => { if(p.clanTag === tag) { stars += p.stars; atks += p.attacks; } });
        return { tag, stars, atks, name: warInfo.starMap.find(p=>p.clanTag===tag).clanName };
    });
    // Add mocks if < 8 to complete the solar system visually
    while(clanData.length < 8) { clanData.push({tag: 'mock'+clanData.length, stars: Math.random()*20, atks: 15, name: 'Unknown Clan'}); }

    // Math Projection for Day X
    clanData.forEach(c => {
        let dailyPace = c.atks > 0 ? (c.stars / c.atks) * 15 : 30;
        let projectedWins = Math.round(Math.random() * simDay); // Rough mock for bonus
        c.simStars = (dailyPace * simDay) + (projectedWins * 10);
    });
    clanData.sort((a,b) => b.simStars - a.simStars); // 1st to 8th

    let timeOffset = Date.now() / 4000;
    if(animationReqs.orbital) cancelAnimationFrame(animationReqs.orbital);

    function render() {
        ctx.clearRect(0,0,w/2,h/2);
        timeOffset += 0.01;

        // Draw Orbits (Isometric pseudo-3D)
        for(let i=0; i<8; i++) {
            let rX = 20 + (i * 22); let rY = rX * 0.4;
            ctx.beginPath(); ctx.ellipse(cx, cy, rX, rY, 0, 0, Math.PI*2);
            ctx.strokeStyle = i >= 6 ? 'rgba(255,51,102,0.3)' : 'rgba(0,229,255,0.15)'; // Outer 2 are red
            ctx.lineWidth = i >= 6 ? 2 : 1;
            ctx.stroke();
        }

        // Sun (1st Place Promotion)
        ctx.beginPath(); ctx.arc(cx, cy, 12, 0, Math.PI*2);
        ctx.fillStyle = '#00e5ff'; ctx.shadowBlur = 20; ctx.shadowColor = '#00e5ff'; ctx.fill(); ctx.shadowBlur=0;

        // Planets
        clanData.forEach((c, i) => {
            if(i === 0) return; // Sun is clan 0
            let rX = 20 + (i * 22); let rY = rX * 0.4;
            let angle = timeOffset * (1 + (8-i)*0.2) + (i*Math.PI/4); // Inner planets move faster
            let px = cx + Math.cos(angle)*rX;
            let py = cy + Math.sin(angle)*rY;
            
            let isUs = c.tag === decodeURIComponent("#YQP0GJ9");
            ctx.beginPath(); ctx.arc(px, py, isUs ? 6 : 4, 0, Math.PI*2);
            ctx.fillStyle = isUs ? '#b300ff' : (i >= 6 ? '#ff3366' : '#748293');
            if(isUs) { ctx.shadowBlur=10; ctx.shadowColor='#b300ff'; }
            ctx.fill(); ctx.shadowBlur=0;
        });

        animationReqs.orbital = requestAnimationFrame(render);
    }
    render();
}

function generateNormalDistribution(mean, stdDev, start, end, steps) {
    let data = []; let labels = []; let stepSize = (end - start) / steps;
    for (let x = start; x <= end; x += stepSize) {
        let exponent = Math.exp(-0.5 * Math.pow((x - mean) / stdDev, 2));
        let y = (1 / (stdDev * Math.sqrt(2 * Math.PI))) * exponent;
        labels.push(Math.round(x)); data.push(y);
    }
    return { labels, data };
}

let oppStars = activeRound.enemyStars !== undefined ? activeRound.enemyStars : "...";
let myAtks = activeRound.myAttacks !== undefined ? activeRound.myAttacks : "...";

    let oppProjected = oppStars + (oppAtksLeft * oppPace);

    let oppMaxStars = oppStars + (oppAtksLeft * 3);
    let starsToClinch = oppMaxStars + 1 - myFloorStars;
    
    let clinchTxt = "";
    if (myStars + (myAtksLeft * 3) <= oppStars) clinchTxt = `<span style="color:var(--dot-red);">[IMPOSSIBLE]</span>`;
    else if (myFloorStars > oppMaxStars) clinchTxt = `<span style="color:var(--dot-green);">0 (SECURED)</span>`;
    else clinchTxt = `${Math.max(0, starsToClinch)} additional 3★ hits`;

    winProbHtml = `
    <div style="background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0,229,255,0.15); border-radius: 12px; padding: 16px; margin-bottom: 24px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-size:10px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing: 1.5px;">AI Win Probability</div>
            <div style="font-size:18px; font-weight:700; color:var(--accent-main); text-shadow: 0 0 10px rgba(0,229,255,0.4);">${winProb}%</div>
        </div>
        <div style="font-size:10px; color:var(--text-muted); text-align:left; margin-top:12px; padding-top:12px; border-top: 1px solid rgba(255,255,255,0.05);">Min 3★ Needed to Clinch: <span style="color:#fff; font-weight:700; margin-left:4px; letter-spacing:0.5px;">${clinchTxt}</span></div>
    </div>
    
    <div class="distribution-bg">
        <span style="position:absolute; top:12px; left:16px; font-size:9px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">Monte Carlo Distribution</span>
        <canvas id="winProbChart"></canvas>
    </div>`;

    let myStdDev = Math.max(0.5, myAtksLeft * 0.3); 
    let oppStdDev = Math.max(1.0, oppAtksLeft * 0.6); 
    let minRange = Math.floor(Math.min(myProjected, oppProjected) - 8);
    let maxRange = Math.ceil(Math.max(myProjected, oppProjected) + 8);
    
    let usDist = generateNormalDistribution(myProjected, myStdDev, minRange, maxRange, 40);
    let themDist = generateNormalDistribution(oppProjected, oppStdDev, minRange, maxRange, 40);
    distLabels = usDist.labels;
    distDataUs = usDist.data;
    distDataThem = themDist.data;
}

let attackSegments = "";
if(myAtks !== "...") {
    let filledSegments = Math.floor((myAtks / rosterSize) * rosterSize);
    for(let i=0; i<rosterSize; i++) attackSegments += `<div class="energy-segment ${i < filledSegments ? 'filled' : ''}"></div>`;
}

// Full War Room Assembly
html += `
<h4 class="section-title" style="margin-top:20px;">Live War Room</h4>
<p class="section-subtitle">Real-time tactical oversight</p>
<div class="war-room-header">
    
    <div class="pendulum-container">
        <div style="position:absolute; top:0; left:0; width:100%; text-align:center; font-size:9px; font-weight:700; color:var(--accent-secondary); letter-spacing:1px; z-index:2;" id="breakPointText">Enemy Break Point: --%</div>
        <canvas id="pendulumCanvas" class="pendulum-canvas"></canvas>
    </div>

    <div style="display: flex; justify-content: center; align-items: center; gap: 24px; margin-bottom: 32px;">
        <div style="display: flex; flex-direction: column; align-items: center; flex: 1;">
            <img src="${myBadgeUrl}" style="width: 64px; height: 64px; filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.4)); margin-bottom: 12px;" onerror="this.src='https://i.imgur.com/iqJbl2r.png'">
            <span style="font-size: 36px; font-weight: 700; color: var(--accent-main); line-height:1; text-shadow: 0 0 20px rgba(0,229,255,0.4);">${myStars}</span>
        </div>
        <div style="font-size: 20px; color: var(--text-muted); font-weight: 700; text-shadow: 0 2px 5px rgba(0,0,0,0.8);">VS</div>
        <div style="display: flex; flex-direction: column; align-items: center; flex: 1;">
            <img src="${oppBadgeUrl}" style="width: 64px; height: 64px; filter: drop-shadow(0 0 15px rgba(255, 51, 102, 0.4)); margin-bottom: 12px;" onerror="this.src='https://i.imgur.com/iqJbl2r.png'">
            <span style="font-size: 36px; font-weight: 700; color: var(--dot-red); line-height:1; text-shadow: 0 0 20px rgba(255,51,102,0.4);">${oppStars}</span>
        </div>
    </div>
    ${winProbHtml}
    <div style="font-size: 10px; font-weight:600; color: var(--text-muted); margin-bottom: 12px; letter-spacing:1px; text-transform:uppercase;">Attacks Remaining: <span style="color:#fff;">${myAtks !== "..." ? rosterSize - myAtks : "..."}</span></div>
    <div class="energy-bar-container">${attackSegments}</div>
</div>`;

// V5.6 Chronos Strike Wave
html += `
<h4 class="section-title">Chronos Strike Wave</h4>
<p class="section-subtitle">Predicted 24H timezone activity clustering</p>
<div class="chronos-wrapper">
    <span style="position:absolute; top:8px; left:12px; font-size:8px; color:var(--text-muted); text-transform:uppercase; z-index:2;">0H</span>
    <span style="position:absolute; top:8px; right:12px; font-size:8px; color:var(--text-muted); text-transform:uppercase; z-index:2;">24H</span>
    <canvas id="chronosCanvas" class="chronos-canvas"></canvas>
</div>`;

// V5.6 Orbital League Projection
html += `
<h4 class="section-title">Orbital League Projection</h4>
<p class="section-subtitle" id="orbitalLabel">PROJECTION: DAY 1</p>
<div class="orbital-wrapper">
    <canvas id="orbitalCanvas" class="orbital-canvas"></canvas>
</div>
<div class="cyber-slider-container">
    <input type="range" class="cyber-slider" id="timelineSlider" min="1" max="7" step="1" value="${activeIdx+1}" oninput="drawOrbitalProjection()">
    <div style="display:flex; justify-content:space-between; font-size:9px; color:var(--text-muted); font-weight:700;">
        <span>DAY 1</span><span>DAY 7</span>
    </div>
</div>
`;

// V5.6 Single Card Pipeline
html += `<h4 class="section-title" style="margin-top:48px;">CWL Matrix Pipeline</h4>`;
html += `<p class="section-subtitle">Round-by-round tactical analysis</p>`;
html += `
<div class="pipeline-controls">
    <button class="pipeline-btn" onclick="changePipelineRound(-1)">◀</button>
    <span class="pipeline-label" id="pipeline-label">ROUND 1</span>
    <button class="pipeline-btn" onclick="changePipelineRound(1)">▶</button>
</div>
<div id="pipeline-content" class="pipeline-card"></div>
`;

container.innerHTML = html;

// Draw all dynamic canvases
setTimeout(() => {
    drawMomentumPendulum(myStars === "..." ? 0 : myStars, oppStars === "..." ? 0 : oppStars, rosterSize - (myAtks==="..."?0:myAtks), rosterSize - (oppAtks==="..."?0:oppAtks));
    drawChronosWave();
    drawOrbitalProjection();
    renderPipelineCard();

    if(distDataUs && distDataThem && distLabels) {
        let ctxP = document.getElementById('winProbChart');
        if (ctxP) {
            if(chartsRegistry.probChart) chartsRegistry.probChart.destroy();
            let gradUs = ctxP.getContext('2d').createLinearGradient(0, 0, 0, 140);
            gradUs.addColorStop(0, 'rgba(0, 229, 255, 0.4)'); gradUs.addColorStop(1, 'rgba(0, 229, 255, 0.0)');
            let gradThem = ctxP.getContext('2d').createLinearGradient(0, 0, 0, 140);
            gradThem.addColorStop(0, 'rgba(255, 51, 102, 0.4)'); gradThem.addColorStop(1, 'rgba(255, 51, 102, 0.0)');

            chartsRegistry.probChart = new Chart(ctxP.getContext('2d'), {
                type: 'line', data: { labels: distLabels, datasets: [
                        { label: 'Us', data: distDataUs, borderColor: '#00e5ff', backgroundColor: gradUs, fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2.5 },
                        { label: 'Them', data: distDataThem, borderColor: '#ff3366', backgroundColor: gradThem, fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2.5 }
                    ]},
                options: { animation: { duration: 2000, easing: 'easeOutQuart' }, responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: true, grid: { display: false }, ticks: { color: '#8b949e', font: {size: 10, family: 'Montserrat', weight:600} } }, y: { display: false, min: 0 } } }
            });
        }
    }
}, 100);

}

}
</script>
</body>
</html>
