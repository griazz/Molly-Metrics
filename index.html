<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
<meta name="theme-color" content="#12141a">
<title>Molly Metrics V9 — Modern Chic</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Josefin+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────
   MODERN CHIC DESIGN SYSTEM
───────────────────────────────────────────── */
:root {
  --bg-dark:       #0d1117;
  --bg-card:       rgba(24, 28, 38, 0.7);
  --accent-main:   #e74c3c; /* Red from beanie */
  --accent-sec:    #3498db; /* Denim Blue from jeans */
  --text-main:     #ecf0f1; /* Off-White from top */
  --text-muted:    #a3afc1;
  --border:        rgba(255, 255, 255, 0.08);
  --font-h:        'Josefin Sans', sans-serif; /* Stylish, characteristic */
  --font-b:        'Poppins', sans-serif; /* Clean, modern body */
  
  --grade-s:       #e74c3c;
  --grade-a:       #3498db;
  --grade-b:       #ecf0f1;
  --grade-c:       #f1c40f;
  --grade-d:       #e67e22;
  --card-shadow:   0 16px 40px rgba(0,0,0,0.7);
  --trans-base:    transform 0.2s, box-shadow 0.2s, background-color 0.2s;
}

*, *::before, *::after { box-sizing: border-box; outline: none; }
html, body {
  height: 100%; width: 100%; margin: 0; padding: 0;
  overflow: hidden; position: fixed; inset: 0;
  background: var(--bg-dark); font-family: var(--font-b);
  color: var(--text-main); -webkit-font-smoothing: antialiased;
}
h1,h2,h3,h4,p { margin: 0; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ─────────────────────────────────────────────
   CHIC SCENE (BLURRED IDOL BACKDROP)
───────────────────────────────────────────── */
#app-backdrop {
  position: fixed; inset: 0; z-index: -10;
  background-image: url('https://i.imgur.com/bEpRYBE.jpeg');
  background-size: cover; background-position: center;
  filter: grayscale(80%) sepia(20%) brightness(0.1) blur(20px);
}
#app-backdrop::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 70% 30%, rgba(52, 152, 219, 0.05), transparent),
              radial-gradient(circle at 30% 70%, rgba(231, 76, 60, 0.05), transparent);
}

.main-scroll { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
.container { padding: calc(32px + env(safe-area-inset-top, 0px)) 16px 16px; max-width: 600px; margin: auto; }

/* ─────────────────────────────────────────────
   UI COMPONENT SHELLS
───────────────────────────────────────────── */
.card {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  border-radius: 20px;
  border: 1px solid var(--border);
  padding: 24px;
  box-shadow: var(--card-shadow);
  margin-bottom: 16px;
  transition: var(--trans-base);
}

/* ─────────────────────────────────────────────
   GLOBAL HEADER & STATS
───────────────────────────────────────────── */
.header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 24px; }
.header-brand { font-family: var(--font-h); font-size: 20px; font-weight: 700; color: var(--text-main); text-transform: uppercase; letter-spacing: 1px; }
.header-brand span { color: var(--accent-main); }
.header-live { font-family: var(--font-b); font-size: 10px; font-weight: 700; color: var(--bg-dark); background: var(--text-main); padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }

.global-card { text-align: center; }
.global-num { font-family: var(--font-h); font-size: 48px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
.global-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
.global-meta { font-family: var(--font-b); font-size: 12px; font-weight: 600; margin-top: 10px; }
.global-meta.g { color: var(--accent-sec); }
.global-meta.c { color: var(--accent-main); }

/* ─────────────────────────────────────────────
   FILTERS & MATRIX
───────────────────────────────────────────── */
.control-panel { display: flex; gap: 8px; margin-bottom: 20px; }
input, select {
  width: 100%; padding: 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(0,0,0,0.1);
  color: var(--text-main); font-family: var(--font-b); font-size: 12px;
}
input::placeholder { color: var(--text-muted); }

.grid-matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.grid-card {
  background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border);
  padding: 16px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; position: relative; transition: var(--trans-base); text-align: center;
}
.grid-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.grid-card:active { transform: translateY(0); background: rgba(255,255,255,0.03); }
.grid-name { font-weight: 600; font-size: 11px; margin-top: 8px; width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }
.grid-th { font-family: var(--font-h); font-size: 10px; font-weight: 700; color: var(--accent-sec); }

/* ── PROGRESS RINGS (Minimal) ── */
.ring-wrap { position: relative; width: 44px; height: 44px; }
.ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 4; }
.ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; }
.ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-h); font-size: 11px; font-weight: 700; }

/* ─────────────────────────────────────────────
   HALL OF FAME (EDITORIAL STYLE)
───────────────────────────────────────────── */
.hof-card { padding: 0; }
.hof-title { font-family: var(--font-h); font-size: 16px; font-weight: 600; color: var(--accent-main); text-align: center; border-bottom: 1px solid var(--border); padding: 16px 0; margin-bottom: 0; }
.hof-entry { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); }
.hof-entry:last-child { border-bottom: none; }
.hof-medal { font-family: var(--font-h); font-size: 16px; font-weight: 700; color: var(--text-muted); width: 24px; text-align: center; margin-right: 12px; }
.hof-body { flex: 1; display: flex; align-items: baseline; }
.hof-name { font-size: 12px; font-weight: 500; color: var(--text-main); margin-right: 6px; }
.hof-th { font-family: var(--font-h); font-size: 9px; font-weight: 700; color: var(--accent-sec); }
.hof-val { font-family: var(--font-h); font-size: 14px; font-weight: 600; color: var(--text-main); }

/* ─────────────────────────────────────────────
   OPERATOR SHEET (BOTTOM MODAL)
───────────────────────────────────────────── */
.sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 1500; opacity: 0; pointer-events: none; transition: 0.3s; }
.sheet-backdrop.active { opacity: 1; pointer-events: all; }
.bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000;
  background: linear-gradient(180deg, #181c26 0%, #0d1117 100%);
  border-top-left-radius: 28px; border-top-right-radius: 28px;
  border-top: 1px solid var(--border); box-shadow: 0 -10px 40px rgba(0,0,0,0.7);
  padding: calc(40px + env(safe-area-inset-top, 0px)) 20px calc(24px + env(safe-area-inset-bottom, 0px)) 20px;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2,1,0.3,1);
  max-height: 90vh; overflow-y: auto;
}
.bottom-sheet.open { transform: translateY(0); }
.close-btn { position: absolute; top: calc(24px + env(safe-area-inset-top, 0px)); right: 18px; width: 30px; height: 30px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; color: var(--text-muted); z-index: 100; transition: background 0.2s, color 0.2s, border-color 0.2s;}

.sheet-head { display: flex; justify-content: space-between; align-items: start; margin-bottom: 24px; }
.sheet-label { font-size: 11px; font-weight: 600; color: var(--accent-sec); text-transform: uppercase; letter-spacing: 2px; }
.sheet-pct { font-family: var(--font-h); font-size: 40px; font-weight: 700; line-height: 1; }
.sheet-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.sheet-cat { text-transform: uppercase; letter-spacing: 2px; font-size: 10px; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 6px; margin: 24px 0 16px; font-weight: 600;}

/* ── Radar Chart custom styling ── */
.radar-box { position: relative; padding: 0 10px 20px; }
.bs-grade { font-family: var(--font-h); font-size: 32px; font-weight: 700; color: var(--text-main); line-height: 1; }
.bs-grade-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

/* ─────────────────────────────────────────────
   BOTTOM NAVIGATION
───────────────────────────────────────────── */
.nav-wrapper { position: fixed; bottom: 0; width: 100%; background: rgba(13,17,23,0.9); backdrop-filter: blur(12px); border-top: 1px solid var(--border); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
.bottom-nav { display: flex; justify-content: space-evenly; max-width: 600px; margin: auto; padding: 12px; }
.nav-btn { display: flex; flex-direction: column; align-items: center; font-family: var(--font-b); font-size: 9px; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
.nav-icon { font-size: 22px; margin-bottom: 4px; transition: 0.2s; }
.nav-btn.active { color: var(--text-main); }
.nav-btn.active .nav-icon { transform: translateY(-4px); filter: drop-shadow(0 4px 10px var(--accent-main)); }

/* ─────────────────────────────────────────────
   UTIL CLASSES
───────────────────────────────────────────── */
.loading { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 1; transition: opacity 0.3s; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--text-main); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.refresh { position: fixed; top: 16px; left: 16px; z-index: 900; background: var(--bg-card); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
.spinning { animation: spin 0.8s linear infinite; }
</style>
</head>
<body>

<div id="app-backdrop"></div>
<div class="refresh" onclick="hardRefresh()">↻</div>

<div class="loading" id="loader">
  <div class="spinner"></div>
</div>

<div class="main-scroll" id="mainScroll">
  <div class="container">
    
    <div id="roster-tab" class="tab-content active">
      <div class="header">
        <div class="header-brand">Molly <span>Metrics</span></div>
        <div class="header-live">HOME // Village</div>
      </div>
      
      <div class="global-card card">
        <div class="global-num" id="global-pct-val">0.0%</div>
        <div class="global-label">Avg. Completion // Roster</div>
        <div id="global-change-val" class="global-meta g">Initializing...</div>
      </div>
      
      <div class="control-panel">
        <input type="text" id="searchInput" placeholder="Search Operators..." oninput="filterRoster()">
        <select id="sortSelect" onchange="filterRoster()">
          <option value="percentage">Overall %</option>
          <option value="thLevel">Town Hall</option>
        </select>
      </div>
      <div id="roster-container" class="grid-matrix"></div>
    </div>

    <div id="trophy-tab" class="tab-content" style="display:none;">
      <div class="global-card card">
        <div class="global-label">Roster Top styles</div>
        <div class="global-meta">Top 3 Elite Operators // By Category</div>
      </div>
      <div id="hof-container"></div>
    </div>

  </div>
</div>

<div class="nav-wrapper">
  <div class="bottom-nav">
    <div class="nav-btn active" onclick="switchTab('roster')"><div class="nav-icon">🛡️</div>MATRIX</div>
    <div class="nav-btn" onclick="switchTab('trophy')"><div class="nav-icon">🏆</div>FAME</div>
  </div>
</div>

<div id="backdrop" class="sheet-backdrop" onclick="closeSheet()"></div>
<div id="bottomSheet" class="bottom-sheet">
  <div class="close-btn" onclick="closeSheet()">✕</div>
  <div id="sheetContent"></div>
</div>

<script>
/* ─────────────────────────────────────────────
   GLOBAL CONFIG (Replace these)
───────────────────────────────────────────── */
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw7ZpPJfVNu8afK61gVbKpFgk1XEh5kJmaZWryJ1oA83uu9Ujy4LnJou1yyg3i_hLFB/exec"; 
const IDOL_IMG_URL = "https://i.imgur.com/bEpRYBE.jpeg"; 

let globalPlayerData = [];
let displayedPlayerData = [];
let bsRadarChart = null;
let hallOfFameData = {};

/* Grade & Category display config */
const GRADE_COLOR  = { S:'#e74c3c', A:'#3498db', B:'#ecf0f1', C:'#f1c40f', D:'#e67e22', 'N/A':'#aaaaaa' };
const CATS = [
  { key:'heroes',    label:'Heroes',    color:'#e74c3c' }, // Red from beanie
  { key:'equipment', label:'Equip',     color:'#3498db' }, // Blue from jeans
  { key:'pets',      label:'Pets',      color:'#ecf0f1' }, // White from top
  { key:'troops',    label:'Troops',    color:'#95a5a6' }, // Grey from vest/shoes
  { key:'spells',    label:'Spells',    color:'#e67e22' }, 
];

window.addEventListener('DOMContentLoaded', () => { 
  // Set the backdrop image if provided
  if (IDOL_IMG_URL && IDOL_IMG_URL !== "https://i.imgur.com/bEpRYBE.jpeg") {
    document.getElementById('app-backdrop').style.backgroundImage = `url('${https://i.imgur.com/bEpRYBE.jpeg}')`;
  }
  fetchData(); 
});

async function fetchData() {
  document.getElementById('loader').style.opacity = '1';
  document.getElementById('loader').style.pointerEvents = 'all';
  const refresh = document.querySelector('.refresh');
  refresh.classList.add('spinning');
  
  try {
    const res = await fetch(WEB_APP_URL + "?action=getDashboardData");
    const data = await res.json();
    if (data.players) {
      globalPlayerData = data.players;
      hallOfFameData = data.hallOfFame || {};
      displayedPlayerData = globalPlayerData;
      
      const totalPct = globalPlayerData.reduce((sum, p) => sum + parseFloat(p.percentage), 0);
      const avgPct   = globalPlayerData.length > 0 ? (totalPct / globalPlayerData.length).toFixed(1) : 0;
      document.getElementById('global-pct-val').innerText = `${avgPct}%`;
      
      const change = globalPlayerData.reduce((sum, p) => sum + parseFloat(p.progression30d), 0) / globalPlayerData.length;
      const changeEl = document.getElementById('global-change-val');
      changeEl.innerText = `${change.toFixed(2)}% // Growth // 30d Velocity`;
      changeEl.classList.remove('g', 'c');
      changeEl.classList.add(change >= 0 ? 'g' : 'c');

      renderHoF();
      filterRoster();
    }
  } catch (err) {
    console.error("Backend error:", err);
  }
  document.getElementById('loader').style.opacity = '0';
  document.getElementById('loader').style.pointerEvents = 'none';
  refresh.classList.remove('spinning');
}

async function hardRefresh() {
  document.getElementById('loader').style.opacity = '1';
  document.getElementById('loader').style.pointerEvents = 'all';
  document.querySelector('.refresh').classList.add('spinning');
  try {
    await fetch(WEB_APP_URL + "?action=clearCache");
    await fetchData();
  } catch (e) {}
}

function filterRoster() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  displayedPlayerData = globalPlayerData.filter(p => p.name.toLowerCase().includes(term));
  displayedPlayerData.sort((a,b) => sort === 'thLevel' ? b.thLevel - a.thLevel : b.percentage - a.percentage);
  renderGrid();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`${tab}-tab`).style.display = 'block';
  document.querySelector(`.nav-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('mainScroll').scrollTop = 0;
}

function renderGrid() {
  const container = document.getElementById('roster-container');
  if (displayedPlayerData.length === 0) {
    container.innerHTML = `<p style="grid-column:1/4; text-align:center; color:var(--text-muted); font-size:12px; padding-top:40px;">No operators match your filter.</p>`;
    return;
  }
  const color = displayedPlayerData.length > 0 ? displayedPlayerData[0].gradeColor : GRADE_COLOR['N/A'];
  container.innerHTML = displayedPlayerData.map((p, i) => `
    <div class="grid-card card" onclick="openSheet(${i})" style="border-color:${GRADE_COLOR[p.grade] || 'var(--border)'}">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 36 36">
          <path class="ring-track" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <path class="ring-fill" stroke="${GRADE_COLOR[p.grade] || var(--accent-sec)}" stroke-dasharray="${p.percentage}, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
        </svg>
        <div class="ring-label">${Math.floor(p.percentage)}%</div>
      </div>
      <div class="grid-name">${p.name}</div>
      <div class="grid-th">TH${p.thLevel} // GRADE ${p.grade || 'NA'}</div>
    </div>`).join('');
}

function renderHoF() {
  const container = document.getElementById('hof-container');
  if (Object.keys(hallOfFameData).length === 0) {
    container.innerHTML = `<p style="text-align:center; color:var(--text-muted); font-size:12px; padding-top:40px;">No Hall of Fame data yet. <br>Sync data to generate.</p>`;
    return;
  }
  const HOF_ICONS = {
    "Friend in Need":          "🤝 Lifetime Donations",
    "Conqueror":               "⚔️ Attacks Won",
    "Unbreakable":             "🛡️ Defenses Won",
    "Shattered and Scattered": "🎯 Scattershots Destroyed",
    "Anti-Artillery":          "🦅 Eagles Destroyed",
    "Heroic Heist":            "💧 Dark Elixir Looted"
  };
  container.innerHTML = Object.entries(hallOfFameData).filter(([_, list]) => list.length > 0).map(([key, list]) => {
    const title = HOF_ICONS[key] || key;
    const entries = list.map((p,idx) => `
      <div class="hof-entry">
        <div class="hof-medal">${idx+1}</div>
        <div class="hof-body">
          <div class="hof-name">${p.name}</div>
          <div class="hof-th">TH${p.th}</div>
        </div>
        <div class="hof-val">${parseInt(p.value).toLocaleString()}</div>
      </div>`).join('');
    return `<div class="hof-card card"><div class="hof-title">${title}</div>${entries}</div>`;
  }).join('');
}

function openSheet(index) {
  const p = displayedPlayerData[index];
  
  /* Build category values from the backend's "current/max" string format */
  const catVals = CATS.map(c => {
    const raw = p[c.key] || "0/1";
    const parts = raw.split('/');
    if (parts.length === 2) {
      const current = parseFloat(parts[0]) || 0;
      const max = parseFloat(parts[1]) || 1;
      const pct = max > 0 ? (current / max) * 100 : 0;
      return Math.min(100, Math.max(0, pct));
    }
    return 0; // Fallback
  });
  
  const sheetContent = `
    <div class="sheet-head">
      <div>
        <div class="sheet-label">Operator // Village</div>
        <div style="font-size:11px; margin-top:2px;">${p.name}</div>
        <div class="sheet-meta">Home // Matrix TH${p.thLevel}</div>
        <div style="font-size:10px; margin-top:6px; font-weight:600; color:${p.progression30d >= 0 ? '#ecf0f1' : '#e74c3c'}">${p.progression30d >= 0 ? '+' : ''}${p.progression30d}% Growth // 30d Velocity</div>
      </div>
      <div style="text-align:right;">
        <div class="bs-grade" style="color:${GRADE_COLOR[p.grade] || '#aaaaaa'}">${p.grade || 'NA'}</div>
        <div class="bs-grade-label">Operator // GRADE</div>
      </div>
    </div>
    
    <div class="radar-box"><canvas id="radarChart"></canvas></div>
    
    <div class="sheet-cat">Village Stats matrix</div>
    <div class="stat-grid">
      ${CATS.map((c, i) => `
        <div class="hof-entry card" style="background:rgba(255,255,255,0.01); border-color:${c.color}">
          <div class="hof-name">${c.label}</div>
          <div class="hof-val" style="color:${c.color}">${p[c.key]}</div>
        </div>`).join('')}
    </div>
  `;
  
  document.getElementById('sheetContent').innerHTML = sheetContent;
  document.getElementById('bottomSheet').classList.add('open');
  document.getElementById('backdrop').classList.add('active');
  
  /* Shared Chart.js defaults */
  Chart.defaults.color      = '#a3afc1';
  Chart.defaults.font.family = "'Poppins', sans-serif";
  Chart.defaults.font.size   = 9;

  if (bsRadarChart) bsRadarChart.destroy();
  const ctx = document.getElementById('radarChart').getContext('2d');
  bsRadarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: CATS.map(c => c.label),
      datasets: [{
        data: catVals,
        backgroundColor: 'rgba(52, 152, 219, 0.2)', // Acc sec background
        borderColor: '#3498db',
        pointBackgroundColor: GRADE_COLOR[p.grade] || '#3498db',
        pointBorderColor: '#12141a',
        pointRadius: 4,
        pointHoverRadius: 6,
        borderWidth: 2
      }]
    },
    options: {
      scales: {
        r: {
          min: 0, max: 100, ticks: { display: false, stepSize: 20 },
          grid: { color: 'rgba(255,255,255,0.05)' },
          angleLines: { color: 'rgba(255,255,255,0.05)' },
          pointLabels: { color: '#a3afc1', font: { weight: 500 } }
        }
      },
      plugins: { legend: { display: false }, tooltip: { enabled: false } }
    }
  });
}

function closeSheet() {
  document.getElementById('bottomSheet').classList.remove('open');
